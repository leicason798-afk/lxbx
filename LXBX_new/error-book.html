<script>
/* === ERROR BOOK DATA === */
function getErrors() {
  try { return JSON.parse(localStorage.getItem('zhibanErrorBook') || '[]'); } catch(e) { return []; }
}
function saveErrors(list) {
  localStorage.setItem('zhibanErrorBook', JSON.stringify(list));
}

// Public API: other pages call this to add wrong answers
window.addWrongAnswer = function(data) {
  // data: {subject, question, options, correctIdx, userIdx, source}
  var list = getErrors();
  // 严格去重：同一题目+学科+用户答案才算重复
  var dupKey = (data.question||'') + '|' + (data.subject||'') + '|' + (data.correctIdx);
  if (list.find(function(e){ return ((e.question||'')+'|'+(e.subject||'')+'|'+e.correctIdx) === dupKey; })) return;
  var newErr = {
    id: 'err_' + Date.now() + '_' + Math.floor(Math.random()*9999),
    subject: data.subject || '未知',
    question: data.question,
    options: data.options,
    correctIdx: data.correctIdx,
    userIdx: data.userIdx,
    source: data.source || '知识农场',
    date: new Date().toLocaleDateString(),
    mastered: false,
    reviewCount: 0,
  };
  list.unshift(newErr);
  saveErrors(list);
  // 仅同步到Supabase一次
  if (window.sbErrorBook && newErr.id) {
    sbErrorBook.add(newErr).catch(function(){});
  }
};

/* === RENDER === */
let currentFilter = 'all';

function filterErrors(f) {
  currentFilter = f;
  renderErrors();
}

function renderErrors() {
  var list = getErrors();
  var filtered = currentFilter === 'all' ? list : list.filter(e => e.subject === currentFilter);
  
  // Stats
  var total = list.length;
  var mastered = list.filter(e => e.mastered).length;
  var pending = total - mastered;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statMastered').textContent = mastered;
  document.getElementById('statRate').textContent = total ? Math.round(mastered / total * 100) + '%' : '0%';

  var container = document.getElementById('errorList');
  var empty = document.getElementById('emptyState');
  
  if (filtered.length === 0) {
    container.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  var subjColors = { '语文': '#c74e08', '数学': '#1450e1', '英语': '#0e7453' };
  var subjBg = { '语文': '#fff8ed', '数学': '#eef6ff', '英语': '#edfcf5' };

  container.innerHTML = filtered.map(function(e, i) {
    return '<div class="error-card ' + (e.mastered ? 'mastered' : '') + ' mb-3">' +
      '<div class="flex items-start justify-between mb-2" onclick="showDetail(\'' + e.id + '\')" style="cursor:pointer">' +
        '<span class="tag" style="background:' + (subjBg[e.subject]||'#f1f5f9') + ';color:' + (subjColors[e.subject]||'#64748b') + '">' + e.subject + '</span>' +
        '<span class="text-xs text-ocean-300">' + e.date + ' · ' + e.source + '</span>' +
      '</div>' +
      '<p class="text-sm font-medium text-ocean-800 mb-2 cursor-pointer" onclick="showDetail(\'' + e.id + '\')">' + e.question + '</p>' +
      '<div class="flex items-center justify-between">' +
        '<span class="text-xs text-ocean-400">复习 ' + e.reviewCount + ' 次</span>' +
        '<div class="flex items-center gap-2">' +
          (e.mastered ? '<span class="text-xs text-mint-500 font-semibold">✅ 已掌握</span>' : '<span class="text-xs text-red-400">待复习</span>') +
          '<button onclick="event.stopPropagation();aiAnalyze(\'' + e.id + '\')" style="font-size:11px;padding:3px 8px;border-radius:8px;border:1px solid #bfdbfe;background:#eff6ff;color:#1d4ed8;cursor:pointer;font-family:inherit">🔍 AI分析</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

/* === DETAIL VIEW === */
function showDetail(id) {
  var list = getErrors();
  var e = list.find(x => x.id === id);
  if (!e) return;
  
  document.getElementById('reviewSubject').textContent = e.subject;
  document.getElementById('reviewQuestion').textContent = e.question;
  document.getElementById('reviewResult').classList.add('hidden');
  
  var optsDiv = document.getElementById('reviewOptions');
  optsDiv.innerHTML = '';
  
  e.options.forEach(function(opt, i) {
    var btn = document.createElement('button');
    btn.style.cssText = 'width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:12px;background:#fff;text-align:left;font-size:14px;cursor:pointer;transition:all .2s;margin-bottom:8px;font-family:inherit';
    btn.textContent = opt;
    btn.onmouseover = function() { btn.style.borderColor = '#3385ff'; btn.style.background = '#eef6ff'; };
    btn.onmouseout = function() { if (!btn.dataset.answered) { btn.style.borderColor = '#e2e8f0'; btn.style.background = '#fff'; } };
    btn.onclick = function() { handleReviewAnswer(id, i, e.correctIdx, btn); };
    optsDiv.appendChild(btn);
  });
  
  document.getElementById('reviewModal').classList.add('active');
}

function handleReviewAnswer(id, userIdx, correctIdx, btn) {
  var buttons = document.querySelectorAll('#reviewOptions button');
  buttons.forEach(function(b, i) {
    b.dataset.answered = 'true';
    b.style.cursor = 'default';
    b.onclick = null;
    if (i === correctIdx) { b.style.borderColor = '#18b47d'; b.style.background = '#edfcf5'; b.style.color = '#0e7453'; }
  });

  var list = getErrors();
  var e = list.find(x => x.id === id);
  var resDiv = document.getElementById('reviewResult');
  var resText = document.getElementById('reviewResultText');
  var resExpl = document.getElementById('reviewExplanation');

  if (userIdx === correctIdx) {
    resText.textContent = '✅ 回答正确！';
    resText.style.color = '#0e7453';
    if (e) {
      e.reviewCount++; e.mastered = true; saveErrors(list);
      if (window.sbErrorBook) sbErrorBook.update(e.id, {mastered:true, reviewCount:e.reviewCount}).catch(function(){});
    }
    resExpl.textContent = '太棒了！这道题你已经掌握了，继续保持！';
  } else {
    btn.style.borderColor = '#ef4444'; btn.style.background = '#fef2f2'; btn.style.color = '#dc2626';
    resText.textContent = '❌ 还需要再练练';
    resText.style.color = '#dc2626';
    if (e) {
      e.reviewCount++; saveErrors(list);
      if (window.sbErrorBook) sbErrorBook.update(e.id, {reviewCount:e.reviewCount}).catch(function(){});
    }
    resExpl.textContent = '正确答案是「' + e.options[correctIdx] + '」。多复习几次就能记住啦！';
  }
  resDiv.classList.remove('hidden');
  renderErrors();
}

function closeReview() { document.getElementById('reviewModal').classList.remove('active'); }

/* === REVIEW MODE === */
let reviewQueue = [];
let reviewIdx = 0;

function startReview() {
  var list = getErrors().filter(e => !e.mastered);
  if (list.length === 0) { if(confirm('没有待复习的错题，太棒了！🎉\n\n去学习画像查看你的成长记录？')){window.location.href='profile.html'} return; }
  reviewQueue = list.sort(() => Math.random() - 0.5);
  reviewIdx = 0;
  showDetail(reviewQueue[0].id);
}

function nextReview() {
  reviewIdx++;
  if (reviewIdx >= reviewQueue.length) {
    closeReview();
    if(confirm('本轮复习完成！继续加油~\n\n去查看学习画像，看看你的进步？')){window.location.href='profile.html'}
    return;
  }
  showDetail(reviewQueue[reviewIdx].id);
}

/* === AI ANALYSIS === */
var _analyzeSelectedId = null;

function aiAnalyze(errorId) {
  var list = getErrors();
  if (list.length === 0) { alert('暂无错题数据'); return; }

  // 如果传入了具体errorId，直接分析该题
  if (errorId) {
    _analyzeSelectedId = errorId;
    var err = list.find(function(e){ return e.id === errorId; });
    if (err) { renderSingleAnalysis(err); return; }
  }

  // 否则显示整体分析
  _analyzeSelectedId = null;
  renderOverallAnalysis(list);
}

function renderSingleAnalysis(err) {
  var optLabels = ['A','B','C','D','E'];
  var correctAns = err.options ? (optLabels[err.correctIdx] + '. ' + err.options[err.correctIdx]) : '未知';
  var userAns    = err.options ? (optLabels[err.userIdx]    + '. ' + err.options[err.userIdx])    : '未知';
  var allOpts    = err.options ? err.options.map(function(o,i){ return optLabels[i]+'. '+o; }).join('  ') : '';

  var html = '<div class="space-y-4">';
  html += '<div class="bg-ocean-50 p-4 rounded-xl">';
  html += '<p class="text-sm font-semibold text-ocean-700 mb-2">📌 题目信息</p>';
  html += '<p class="text-sm text-ocean-800 font-medium mb-2">' + (err.question || '题目内容') + '</p>';
  if (allOpts) html += '<p class="text-xs text-ocean-500 mb-2">' + allOpts + '</p>';
  html += '<p class="text-sm text-green-600">✓ 正确答案：' + correctAns + '</p>';
  html += '<p class="text-sm text-red-500">✗ 你的答案：' + userAns + '</p>';
  html += '</div>';
  html += '<div id="aiAnalysisResult" class="bg-gradient-to-br from-blue-50 to-mint-50 p-4 rounded-xl">';
  html += '<p class="text-sm font-semibold text-ocean-700 mb-3">🤖 AI逐题解析</p>';
  html += '<div id="aiAnalysisText" class="text-sm text-ocean-700 leading-relaxed">';
  html += '<div class="flex items-center gap-2 text-ocean-400"><span class="animate-pulse">●</span><span>AI正在分析这道题，请稍候...</span></div>';
  html += '</div></div>';
  html += '<button onclick="aiAnalyze()" class="w-full py-2 rounded-xl bg-ocean-100 text-ocean-600 text-sm font-semibold hover:bg-ocean-200 transition">← 查看全部错题整体分析</button>';
  html += '</div>';

  document.getElementById('analysisContent').innerHTML = html;
  document.getElementById('analysisModal').classList.add('active');

  var prompt = '你是一位专业的中小学辅导老师，请对以下错题进行详细解析：\n\n'
    + '【学科】' + err.subject + '\n'
    + '【题目】' + (err.question || '') + '\n'
    + (allOpts ? '【选项】' + allOpts + '\n' : '')
    + '【学生选择】' + userAns + '\n'
    + '【正确答案】' + correctAns + '\n\n'
    + '请按以下结构回答：\n'
    + '1. 【知识点】这道题考查的核心知识点是什么\n'
    + '2. 【错误原因】学生为什么会选错，分析具体原因\n'
    + '3. 【详细解析】一步一步解析正确答案的推导过程\n'
    + '4. 【记忆口诀】给一个帮助记忆该知识点的小口诀或技巧\n'
    + '5. 【类似练习】出一道同类型的练习题让学生巩固\n\n'
    + '语气要亲切鼓励，适合中小学生阅读，不要使用markdown格式。';

  callCozeForAnalysis(prompt);
}

function callCozeForAnalysis(prompt) {
  var PAT    = 'pat_8LaYsLi87yoXz54xFMPR8pFGlkH8xjl4WTSKRpeI3hJ0GrS4ZeDylHVAqKZLf80R';
  var BOT_ID = '7632315366266011648';
  var resultEl = document.getElementById('aiAnalysisText');
  if (!resultEl) return;

  var fullText = '';
  var currentEvent = '';

  fetch('https://api.coze.cn/v3/chat', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + PAT,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      bot_id: BOT_ID,
      user_id: 'eb_' + (localStorage.getItem('zhibanUserId') || Date.now()),
      stream: true,
      auto_save_history: false,
      additional_messages: [{ role: 'user', content: prompt, content_type: 'text' }]
    })
  }).then(function(resp) {
    if (!resp.ok) {
      resultEl.innerHTML = '<p style="color:red">请求失败(' + resp.status + ')，请重试。</p>';
      return;
    }
    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buf = '';

    function read() {
      reader.read().then(function(result) {
        if (result.done) {
          if (!fullText) resultEl.innerHTML = '<p style="color:red">未收到回复，请重试。</p>';
          return;
        }
        buf += decoder.decode(result.value, { stream: true });
        var lines = buf.split('\n');
        buf = lines.pop();
        lines.forEach(function(line) {
          if (line.startsWith('event:')) {
            currentEvent = line.slice(6).trim();
          } else if (line.startsWith('data:')) {
            var raw = line.slice(5).trim();
            if (!raw || raw === '[DONE]') return;
            try {
              var data = JSON.parse(raw);
              if (currentEvent === 'conversation.message.delta' &&
                  data.role === 'assistant' && data.type === 'answer' && data.content) {
                fullText += data.content;
                resultEl.innerHTML = fullText
                  .replace(/\n/g, '<br>')
                  .replace(/【([^】]+)】/g, '<strong style="color:#1e40af">【$1】</strong>');
              }
            } catch(e) {}
          }
        });
        read();
      }).catch(function(e) {
        resultEl.innerHTML = '<p style="color:red">读取中断，请重试。</p>';
      });
    }
    read();
  }).catch(function(e) {
    resultEl.innerHTML = '<p style="color:red">网络错误：' + e.message + '，请重试。</p>';
  });
}


function renderOverallAnalysis(list) {
  var subjCount = {};
  list.forEach(function(e) { subjCount[e.subject] = (subjCount[e.subject] || 0) + 1; });
  var weakest = Object.entries(subjCount).sort(function(a,b){ return b[1]-a[1]; });
  var masteredCount = list.filter(function(e){ return e.mastered; }).length;
  var rate = Math.round(masteredCount / list.length * 100);

  var html = '<div class="space-y-4">';
  html += '<div class="bg-ocean-50 p-4 rounded-xl"><p class="text-sm font-semibold text-ocean-700 mb-2">📊 错题概览</p>';
  html += '<p class="text-sm text-ocean-600">共收集 <strong>' + list.length + '</strong> 道错题，已掌握 <strong>' + masteredCount + '</strong> 道，掌握率 <strong>' + rate + '%</strong></p></div>';

  html += '<div class="bg-red-50 p-4 rounded-xl"><p class="text-sm font-semibold text-red-600 mb-2">⚠️ 薄弱学科分析</p>';
  weakest.forEach(function(w) {
    var subjectMastered = list.filter(function(e){ return e.subject===w[0]&&e.mastered; }).length;
    html += '<div class="flex justify-between items-center text-sm text-red-700 mb-1"><span>' + w[0] + '：' + w[1] + '道错题</span><span class="text-xs text-red-400">已掌握' + subjectMastered + '道</span></div>';
    html += '<div class="w-full bg-red-100 rounded-full h-2 mb-2"><div class="bg-red-400 h-2 rounded-full" style="width:' + (w[1]>0?Math.round(subjectMastered/w[1]*100):0) + '%"></div></div>';
  });
  html += '</div>';

  // 各题选择分析按钮
  html += '<div class="bg-blue-50 p-4 rounded-xl"><p class="text-sm font-semibold text-blue-600 mb-2">🔎 选择单道题针对分析</p>';
  html += '<div class="space-y-2 max-h-40 overflow-y-auto">';
  list.slice(0,10).forEach(function(e){
    html += '<button onclick="aiAnalyze(\'' + e.id + '\')" class="w-full text-left px-3 py-2 rounded-lg bg-white border border-blue-100 hover:border-blue-300 text-xs text-ocean-700 transition">' +
      '<span class="font-semibold text-blue-500">[' + e.subject + ']</span> ' + (e.question||'').slice(0,35) + (e.question&&e.question.length>35?'…':'') + '</button>';
  });
  if(list.length>10) html += '<p class="text-xs text-ocean-400 text-center mt-1">仅显示最近10道，更多请在错题列表中点击</p>';
  html += '</div></div>';

  html += '<div class="bg-mint-50 p-4 rounded-xl"><p class="text-sm font-semibold text-mint-500 mb-2">💡 AI建议</p><ul class="text-sm text-ocean-600 space-y-1">';
  if(weakest.length>0) html += '<li>• 重点复习「' + weakest[0][0] + '」学科，错题最多</li>';
  if(rate<50) html += '<li>• 掌握率较低，建议每天复习5-10道错题</li>';
  if(rate>=50&&rate<80) html += '<li>• 掌握率不错，再加把劲突破80%</li>';
  if(rate>=80) html += '<li>• 掌握率很高，继续保持！可以挑战新知识</li>';
  html += '<li>• 建议在AI伴学中针对薄弱知识点提问</li>';
  html += '</ul></div></div>';

  document.getElementById('analysisContent').innerHTML = html;
  document.getElementById('analysisModal').classList.add('active');
}
