<script>

/* === IDIOM DATA === */
const IDIOMS = [
  {chars:['一','心','一','意'],blank:2,meaning:'形容心思、意念专一',distractors:['二','三','百','千']},
  {chars:['画','龙','点','睛'],blank:3,meaning:'比喻在关键处点明要旨，使内容生动传神',distractors:['眼','目','星','精']},
  {chars:['守','株','待','兔'],blank:0,meaning:'比喻不主动努力，存有侥幸心理',distractors:['看','望','坐','等']},
  {chars:['亡','羊','补','牢'],blank:2,meaning:'出了问题后及时补救，防止继续受损失',distractors:['建','修','做','搭']},
  {chars:['刻','舟','求','剑'],blank:1,meaning:'比喻拘泥成规，不知变通',distractors:['船','木','板','桥']},
  {chars:['对','牛','弹','琴'],blank:3,meaning:'比喻对不懂道理的人讲道理',distractors:['筝','鼓','笛','曲']},
  {chars:['叶','公','好','龙'],blank:2,meaning:'比喻表面爱好而实际并不真正喜欢',distractors:['爱','看','赏','养']},
  {chars:['掩','耳','盗','铃'],blank:0,meaning:'比喻自己欺骗自己',distractors:['捂','遮','堵','闭']},
  {chars:['揠','苗','助','长'],blank:3,meaning:'比喻违反事物发展规律，急于求成',distractors:['大','高','壮','快']},
  {chars:['胸','有','成','竹'],blank:2,meaning:'比喻做事之前已有充分的准备和把握',distractors:['大','老','全','满']},
  {chars:['画','蛇','添','足'],blank:3,meaning:'比喻做多余的事，反而不恰当',distractors:['手','尾','腿','翼']},
  {chars:['半','途','而','废'],blank:3,meaning:'做事没有完成就停止了',distractors:['弃','退','逃','返']},
  {chars:['自','相','矛','盾'],blank:2,meaning:'比喻言行自相抵触',distractors:['刀','枪','剑','戟']},
  {chars:['井','底','之','蛙'],blank:3,meaning:'比喻见识狭窄的人',distractors:['鱼','龟','虾','蛇']},
  {chars:['狐','假','虎','威'],blank:0,meaning:'比喻借别人的势力来欺压人',distractors:['猫','狼','犬','鼠']},
  {chars:['四','面','楚','歌'],blank:2,meaning:'形容四面受敌，处于孤立无援的境地',distractors:['悲','战','凯','情']},
  {chars:['杯','弓','蛇','影'],blank:1,meaning:'比喻疑神疑鬼，自相惊扰',distractors:['箭','刀','剑','矛']},
  {chars:['鹬','蚌','相','争'],blank:3,meaning:'比喻双方争执不下，两败俱伤',distractors:['斗','打','吵','拼']},
  {chars:['愚','公','移','山'],blank:2,meaning:'比喻坚持不懈地改造自然和坚定不移地进行斗争',distractors:['搬','推','挖','翻']},
  {chars:['悬','梁','刺','股'],blank:0,meaning:'形容刻苦学习',distractors:['挂','吊','绑','系']},
];

let questions=[], current=0, score=0, correctCount=0, answered=false;

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function showStart(){
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('gameScreen').classList.add('hidden');
}

function startGame(){
  questions=shuffle(IDIOMS).slice(0,10);
  current=0;score=0;correctCount=0;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');
  document.getElementById('qTotal').textContent=questions.length;
  loadQuestion();
}

function loadQuestion(){
  answered=false;
  const q=questions[current];
  document.getElementById('qNum').textContent=current+1;
  document.getElementById('scoreText').textContent=score;
  document.getElementById('progressBar').style.width=`${(current/questions.length)*100}%`;
  document.getElementById('nextBtn').classList.add('hidden');
  document.getElementById('meaningBox').innerHTML='';

  // Build grid
  const grid=document.getElementById('idiomGrid');
  grid.innerHTML='';
  q.chars.forEach((ch,i)=>{
    const div=document.createElement('div');
    if(i===q.blank){
      div.className='idiom-char blank';
      div.id='blankCell';
      div.textContent='?';
    }else{
      div.className='idiom-char filled';
      div.textContent=ch;
    }
    grid.appendChild(div);
  });

  // Build choices (correct + 3 distractors)
  const correct=q.chars[q.blank];
  const wrongs=shuffle(q.distractors).slice(0,3);
  const choices=shuffle([correct,...wrongs]);

  const cGrid=document.getElementById('choicesGrid');
  cGrid.innerHTML='';
  choices.forEach(ch=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.textContent=ch;
    btn.onclick=()=>checkAnswer(btn,ch,correct,q);
    cGrid.appendChild(btn);
  });
}

function checkAnswer(btn,val,ans,q){
  if(answered)return;
  answered=true;
  const blank=document.getElementById('blankCell');
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);

  if(val===ans){
    btn.classList.add('correct');
    blank.textContent=ans;
    blank.className='idiom-char correct-reveal';
    score+=10;
    correctCount++;
  }else{
    btn.classList.add('wrong');
    blank.textContent=ans;
    blank.className='idiom-char correct-reveal';
    document.querySelectorAll('.choice-btn').forEach(b=>{if(b.textContent===ans)b.classList.add('correct')});
    // Save to error book
    (function(){
      var eb=[];try{eb=JSON.parse(localStorage.getItem('zhibanErrorBook')||'[]')}catch(e){}
      var fullIdiom=q.chars.join('');
      var qText='成语填空：'+fullIdiom+'（第'+(q.blank+1)+'字）';
      if(window._lastSavedIQ!==qText && !eb.find(function(x){return x.question===qText})){
        var allC=[ans];document.querySelectorAll('.choice-btn').forEach(function(b){if(allC.indexOf(b.textContent)<0)allC.push(b.textContent)});
        window._lastSavedIQ=qText;
        eb.unshift({id:'err_'+Date.now(),subject:'语文',question:qText,options:allC,correctIdx:0,userIdx:allC.indexOf(val)>=0?allC.indexOf(val):1,source:'成语冒险',date:new Date().toLocaleDateString(),mastered:false,reviewCount:0});
        localStorage.setItem('zhibanErrorBook',JSON.stringify(eb));
        if(window.sbErrorBook&&eb.length){var _si=eb[0];if(_si&&_si.id)sbErrorBook.add(_si).catch(function(){});}
      }
    })();
  }

  document.getElementById('scoreText').textContent=score;

  // Show meaning
  document.getElementById('meaningBox').innerHTML=`<div class="meaning-box">💡 <strong>${q.chars.join('')}</strong>：${q.meaning}</div>`;

  if(current<questions.length-1){
    document.getElementById('nextBtn').classList.remove('hidden');
  }else{
    setTimeout(endGame,1200);
  }
}

function nextQuestion(){
  current++;
  loadQuestion();
}

function endGame(){
  setTimeout(function(){
    var eb=[];try{eb=JSON.parse(localStorage.getItem('zhibanErrorBook')||'[]')}catch(e){}
    var recent=eb.filter(function(e){return e.source==='成语冒险'&&!e.mastered});
    if(recent.length>0){
      var tip=document.createElement('div');
      tip.style.cssText='text-align:center;margin-top:12px;padding:10px;border-radius:12px;background:#eef6ff;border:1px solid #bcdeff;font-size:13px;color:#1450e1';
      tip.innerHTML='📝 '+recent.length+'道错题已收入错题本，<a href="error-book.html" style="font-weight:700;text-decoration:underline">去复习 →</a>';
      var panel=document.getElementById('endScreen');
      if(panel)panel.appendChild(tip);
    }
  },500);
  document.getElementById('progressBar').style.width='100%';
  const pct=correctCount/questions.length;
  document.getElementById('fScore').textContent=score;
  document.getElementById('fCorrect').textContent=`${correctCount}/${questions.length}`;
  document.getElementById('resultEmoji').textContent=pct>=.9?'🏅':pct>=.7?'📖':pct>=.5?'✏️':'📝';
  document.getElementById('resultMsg').textContent=pct>=.9?'博学多才！成语小状元！':pct>=.7?'表现出色，继续积累！':pct>=.5?'还不错，多读多记！':'加油，积少成多！';
  document.getElementById('scoreOverlay').classList.add('active');
  document.getElementById('scorePopup').classList.add('active');
  const earned=score;_addPoints(earned);document.getElementById('earnedPts').textContent='+'+earned;
}
function closeScore(){
  document.getElementById('scoreOverlay').classList.remove('active');
  document.getElementById('scorePopup').classList.remove('active');
}

    av.innerHTML = '<img src="' + u.customAvatar + '" style="width:36px;height:36px;object-fit:cover;border-radius:50%">';
  } catch(e) {}
});
window.addEventListener('storage', function(e){
  if (e.key === 'zhibanUser') {
    try {
      var u = JSON.parse(e.newValue || '{}');
      var av = document.getElementById('navAvatar');
      var nm = document.getElementById('navUserName');
      if (!av) return;
      if (u.customAvatar) {
        av.innerHTML = '<img src="' + u.customAvatar + '" style="width:36px;height:36px;object-fit:cover;border-radius:50%">';
      }
      if (nm && u.userName) nm.textContent = u.userName;
    } catch(e) {}
  }
});
</script>
