<style>
:root {
  --nav-h: 64px;
  --font-mono: 'JetBrains Mono', monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans SC',sans-serif;color:#1e293b;background:#f8faff;overflow-x:hidden;min-height:100vh}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(51,133,255,.06) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(24,180,125,.05) 0%,transparent 60%)}
#navbar{background:rgba(255,255,255,.82);backdrop-filter:blur(16px) saturate(1.4);box-shadow:0 1px 24px rgba(20,37,87,.07)}
#mobileMenu{transition:max-height .35s ease,opacity .3s;max-height:0;opacity:0;overflow:hidden}
#mobileMenu.open{max-height:400px;opacity:1}
.avatar-svg{border-radius:50%}

.page-header {
  text-align: center;
  padding: 32px 0 24px;
}
.page-header h1 {
  font-family: 'Noto Serif SC', serif;
  font-weight: 700;
  font-size: 28px;
  color: #1e293b;
  margin-bottom: 8px;
}
.page-header p {
  font-size: 14px;
  color: #64748b;
}

/* Stat cards */
.stat-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 24px;
}
.stat-card {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 4px 20px rgba(20,37,87,.06);
  border: 1px solid rgba(51,133,255,.06);
  position: relative;
  overflow: hidden;
  transition: transform .25s, box-shadow .25s;
}
.stat-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 32px rgba(51,133,255,.12);
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  border-radius: 16px 16px 0 0;
}
.stat-card:nth-child(1)::before { background: linear-gradient(90deg, #3385ff, #59a9ff); }
.stat-card:nth-child(2)::before { background: linear-gradient(90deg, #18b47d, #3acd95); }
.stat-card:nth-child(3)::before { background: linear-gradient(90deg, #ff9f38, #ffc371); }
.stat-card:nth-child(4)::before { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }

.stat-icon {
  width: 42px; height: 42px;
  border-radius: 12px;
  display: grid;
  place-items: center;
  margin-bottom: 12px;
}
.stat-number {
  font-size: 28px;
  font-weight: 700;
  font-family: var(--font-mono);
  line-height: 1;
  margin-bottom: 4px;
}
.stat-label {
  font-size: 12px;
  color: #64748b;
  font-weight: 500;
}
.stat-change {
  font-size: 11px;
  font-weight: 600;
  margin-top: 8px;
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 8px;
  border-radius: 20px;
}
.stat-change.up { background: #edfcf5; color: #0f9165; }
.stat-change.down { background: #fff8ed; color: #c74e08; }

/* Chart panels */
.chart-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
.chart-panel {
  background: #fff;
  border-radius: 16px;
  padding: 22px;
  box-shadow: 0 4px 20px rgba(20,37,87,.06);
  border: 1px solid rgba(51,133,255,.06);
}
.chart-panel-title {
  font-size: 14px;
  font-weight: 600;
  color: #1e293b;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.chart-panel-title svg {
  width: 18px; height: 18px;
  color: #3385ff;
}

/* Full width panel */
.full-panel {
  grid-column: 1 / -1;
}

/* Weak points */
.weak-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.weak-item {
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(51,133,255,.08);
  background: #f8faff;
  transition: all .2s;
}
.weak-item:hover {
  border-color: #3385ff;
  box-shadow: 0 0 0 2px rgba(51,133,255,.08);
}
.weak-subject {
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  padding: 2px 8px;
  border-radius: 6px;
  display: inline-block;
  margin-bottom: 8px;
}
.weak-topic {
  font-size: 13px;
  font-weight: 600;
  color: #1e293b;
  margin-bottom: 4px;
}
.weak-score {
  font-size: 11px;
  color: #64748b;
}
.weak-bar {
  height: 4px;
  background: #e2e8f0;
  border-radius: 99px;
  margin-top: 8px;
  overflow: hidden;
}
.weak-bar-fill {
  height: 100%;
  border-radius: 99px;
  transition: width 1s cubic-bezier(.4,0,.2,1);
}

/* Activity heatmap */
.heatmap-row {
  display: flex;
  gap: 3px;
  margin-bottom: 3px;
}
.heatmap-cell {
  width: 14px; height: 14px;
  border-radius: 3px;
  background: #eef6ff;
  transition: all .2s;
  cursor: default;
}
.heatmap-cell:hover {
  transform: scale(1.3);
  box-shadow: 0 2px 8px rgba(51,133,255,.2);
}
.heatmap-cell.l1 { background: #bcdeff; }
.heatmap-cell.l2 { background: #59a9ff; }
.heatmap-cell.l3 { background: #3385ff; }
.heatmap-cell.l4 { background: #1450e1; }

.heatmap-legend {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 8px;
  font-size: 10px;
  color: #94a3b8;
}
.heatmap-legend span {
  width: 10px; height: 10px;
  border-radius: 2px;
}

/* Recent sessions */
.session-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 10px;
  transition: background .2s;
  cursor: pointer;
}
.session-item:hover { background: #f0f5ff; }
.session-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: grid;
  place-items: center;
  flex-shrink: 0;
  font-size: 16px;
}
.session-info { flex: 1; min-width: 0; }
.session-title {
  font-size: 13px;
  font-weight: 500;
  color: #1e293b;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.session-meta {
  font-size: 11px;
  color: #94a3b8;
  margin-top: 2px;
}
.session-count {
  font-size: 12px;
  font-weight: 600;
  color: #3385ff;
  background: #eef6ff;
  padding: 2px 10px;
  border-radius: 20px;
  flex-shrink: 0;
}

/* AI advice box */
.ai-advice {
  background: linear-gradient(135deg, rgba(51,133,255,.04), rgba(24,180,125,.04));
  border: 1px solid rgba(51,133,255,.1);
  border-radius: 14px;
  padding: 18px 20px;
  margin-top: 16px;
}
.ai-advice-header {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  color: #3385ff;
  margin-bottom: 10px;
}
.ai-advice-text {
  font-size: 13px;
  color: #475569;
  line-height: 1.75;
}
.ai-advice-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 12px;
  padding: 8px 20px;
  background: linear-gradient(135deg, #3385ff, #1450e1);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .25s;
  font-family: inherit;
}
.ai-advice-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(51,133,255,.3);
}

/* Animations */
@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
.fade-up { animation: fadeUp .5s ease both; }
.fd1 { animation-delay: .05s; }
.fd2 { animation-delay: .1s; }
.fd3 { animation-delay: .15s; }
.fd4 { animation-delay: .2s; }
.fd5 { animation-delay: .25s; }
.fd6 { animation-delay: .3s; }

@media (max-width: 768px) {
  .stat-row { grid-template-columns: repeat(2, 1fr); }
  .chart-grid { grid-template-columns: 1fr; }
  .weak-grid { grid-template-columns: 1fr; }
  .page-header h1 { font-size: 22px; }
}
</style>
</head>

<script>
/* ═══════════════════════════════════════════════════════
   DATA COLLECTION FROM LOCALSTORAGE
   ═══════════════════════════════════════════════════════ */
const HISTORY_KEY = 'zhibanChatHistory';

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
}

function analyzeData() {
  const all = loadHistory();
  // errorBook
  let errorBook = [];
  try { errorBook = JSON.parse(localStorage.getItem('zhibanErrorBook') || '[]'); } catch {}
  // timerStats
  let timerStats = {};
  try { timerStats = JSON.parse(localStorage.getItem('zhibanTimerStats') || '{}'); } catch {}

  let totalSessions = all.length;
  let userMessages = 0;
  let botMessages = 0;
  const topicCounts = {};
  const dateCounts = {};
  const subjectData = { '数学':0, '语文':0, '英语':0, '物理':0, '化学':0, '其他':0 };
  const keywordMap = {
    '数学':['数学','计算','方程','几何','算术','加减乘除','分数','面积','周长','三角'],
    '语文':['语文','作文','阅读','成语','诗词','写作','朗读','汉字','拼音','课文'],
    '英语':['英语','单词','语法','句型','翻译','听力','口语','English'],
    '物理':['物理','力学','浮力','电路','光学','运动','速度','能量'],
    '化学':['化学','元素','分子','反应','酸碱','实验'],
  };

  all.forEach(session => {
    // Support both array of sessions with messages, and flat message arrays
    const msgs = Array.isArray(session.messages) ? session.messages : (Array.isArray(session) ? session : []);
    
    msgs.forEach(m => {
      if (m.role === 'user') {
        userMessages++;
        // Extract date from message time
        const msgTime = m.time || '';
        if (msgTime) {
          // Parse formats like "4/9 14:30" or "2026/4/9" or "09:30"
          const dateMatch = msgTime.match(/(\d+)[\/\-](\d+)/);
          if (dateMatch) {
            const key = String(dateMatch[1]).padStart(2,'0') + '/' + String(dateMatch[2]).padStart(2,'0');
            dateCounts[key] = (dateCounts[key] || 0) + 1;
          }
        }
        let matched = false;
        for (const [subj, keywords] of Object.entries(keywordMap)) {
          for (const kw of keywords) {
            if (m.content && m.content.includes(kw)) {
              subjectData[subj]++;
              topicCounts[kw] = (topicCounts[kw] || 0) + 1;
              matched = true;
              break;
            }
          }
          if (matched) break;
        }
        if (!matched) subjectData['其他']++;
      } else {
        botMessages++;
      }
    });

    // Also try session-level time
    if (session.time) {
      const dateMatch = String(session.time).match(/(\d+)[\/\-](\d+)/);
      if (dateMatch) {
        const key = String(dateMatch[1]).padStart(2,'0') + '/' + String(dateMatch[2]).padStart(2,'0');
        dateCounts[key] = (dateCounts[key] || 0) + 1;
      }
    }
  });

  // Add errorBook data to subject counts
  errorBook.forEach(e => {
    const subj = e.subject || '';
    if (subjectData[subj] !== undefined) subjectData[subj] += 0.5; // weight errors
  });

  // Timer stats — total focus minutes and sessions
  let totalFocusMinutes = 0, totalFocusSessions = 0;
  for (const day in timerStats) {
    totalFocusMinutes += timerStats[day].minutes || 0;
    totalFocusSessions += timerStats[day].sessions || 0;
    // Count timer days in dateCounts for heatmap
    const dateMatch = day.match(/(\d+)[\/\-](\d+)/);
    if (dateMatch) {
      const key = String(dateMatch[1]).padStart(2,'0') + '/' + String(dateMatch[2]).padStart(2,'0');
      dateCounts[key] = (dateCounts[key] || 0) + (timerStats[day].sessions || 0);
    }
  }

  const activeDays = Object.keys(dateCounts).length;
  const totalErrors = errorBook.length;
  const masteredErrors = errorBook.filter(e => e.mastered).length;

  const engagementScore = Math.min(100, Math.round(
    (totalSessions * 6) + (userMessages * 2) + (activeDays * 8) +
    (totalFocusSessions * 4) + (masteredErrors * 5)
  ));

  return {
    all, totalSessions, userMessages, botMessages, topicCounts, dateCounts,
    subjectData, activeDays, engagementScore,
    errorBook, totalErrors, masteredErrors, totalFocusMinutes, totalFocusSessions,
  };
}

/* ═══════════════════════════════════════════════════════
   RENDER DASHBOARD

function renderDashboard() {
  const data = analyzeData();

  // Stat cards
  document.getElementById('statSessions').textContent = data.totalSessions;
  document.getElementById('statQuestions').textContent = data.userMessages;
  document.getElementById('statDays').textContent = data.activeDays;
  document.getElementById('statScore').textContent = data.engagementScore;

  // Session change label
  if (data.totalSessions === 0) {
    document.getElementById('statSessionsChange').textContent = '去开始第一次对话';
    document.getElementById('statSessionsChange').className = 'stat-change';
  } else {
    document.getElementById('statSessionsChange').textContent = '↑ 本周活跃';
  }

  // Questions change
  if (data.userMessages === 0) {
    document.getElementById('statQuestionsChange').textContent = '快去提问吧';
    document.getElementById('statQuestionsChange').className = 'stat-change';
  }

  // Days change
  if (data.activeDays > 0) {

  }

  if (data.engagementScore >= 80) {
    document.getElementById('statScoreChange').textContent = '🌟 优秀';
  } else if (data.engagementScore >= 50) {
    document.getElementById('statScoreChange').textContent = '💪 良好';
  } else if (data.engagementScore >= 20) {
    document.getElementById('statScoreChange').textContent = '📚 加油';
  } else {
    document.getElementById('statScoreChange').textContent = '🚀 刚起步';
  }

  // Subject distribution doughnut
  const subjectLabels = Object.keys(data.subjectData);
  const subjectValues = Object.values(data.subjectData).map(v => Math.max(0, v));
  const hasSubjectData = subjectValues.some(v => v > 0);

  const subjectChartEl = document.getElementById('subjectChart');
  if (!hasSubjectData) {
    subjectChartEl.parentElement.innerHTML += '<p style="text-align:center;color:#94a3b8;font-size:13px;margin-top:12px">开始学习后显示学科分布</p>';
  }
  new Chart(subjectChartEl, {
    type: 'doughnut',
    data: {
      labels: hasSubjectData ? subjectLabels : ['暂无数据'],
      datasets: [{
        data: hasSubjectData ? subjectValues : [1],
        backgroundColor: hasSubjectData
          ? ['#3385ff','#18b47d','#ff9f38','#8b5cf6','#ec4899','#94a3b8']
          : ['#e2e8f0'],
        borderWidth: 0,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '62%',
      plugins: {
        legend: { position:'bottom', labels: { padding:12, usePointStyle:true, pointStyleWidth:8, font:{size:11,family:'Noto Sans SC'} } }
      }
    }
  });

  // Radar chart (knowledge mastery — simulated from topic frequency)
  const radarLabels = ['数学思维','语文素养','英语能力','理科逻辑','学习主动性','知识广度'];
  const maxQ = Math.max(1, data.userMessages);
  const radarValues = [
    Math.min(100, Math.round((data.subjectData['数学']/maxQ)*300 + 20)),
    Math.min(100, Math.round((data.subjectData['语文']/maxQ)*300 + 15)),
    Math.min(100, Math.round((data.subjectData['英语']/maxQ)*300 + 10)),
    Math.min(100, Math.round(((data.subjectData['物理']+data.subjectData['化学'])/maxQ)*300 + 12)),
    Math.min(100, Math.round(data.engagementScore * 0.9 + 10)),
    Math.min(100, Math.round(Object.keys(data.topicCounts).length * 8 + 15)),
  ];

  new Chart(document.getElementById('radarChart'), {
    type: 'radar',
    data: {
      labels: radarLabels,
      datasets: [{
        label: '掌握度',
        data: radarValues,
        fill: true,
        backgroundColor: 'rgba(51,133,255,.12)',
        borderColor: '#3385ff',
        borderWidth: 2,
        pointBackgroundColor: '#3385ff',
        pointBorderColor: '#fff',
        pointBorderWidth: 2,
        pointRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        r: {
          beginAtZero: true,
          max: 100,
          ticks: { stepSize: 25, font:{size:10}, backdropColor:'transparent' },
          pointLabels: { font: {size:11, family:'Noto Sans SC'} },
          grid: { color: 'rgba(51,133,255,.08)' },
          angleLines: { color: 'rgba(51,133,255,.08)' },
        }
      },
      plugins: { legend: { display: false } }
    }
  });

  // Trend chart (last 7 days)
  const today = new Date();
  const trendLabels = [];
  const trendQ = [];
  const trendTimer = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    const key = mm + '/' + dd;
    trendLabels.push((d.getMonth()+1) + '/' + d.getDate());
    // Count user messages on this day
    let qCount = 0;
    data.all.forEach(session => {
      const msgs = Array.isArray(session.messages) ? session.messages : [];
      msgs.forEach(m => {
        if (m.role === 'user' && m.time && m.time.includes(key)) qCount++;
      });
      if (session.time && String(session.time).includes(key)) qCount++;
    });
    // Timer sessions on this day
    let timerCount = 0;
    try {
      const ts = JSON.parse(localStorage.getItem('zhibanTimerStats') || '{}');
      for (const day in ts) {
        if (day.includes(key) || day.includes(mm + '-' + dd)) timerCount += ts[day].sessions || 0;
      }
    } catch {}
    trendQ.push(qCount);
    trendTimer.push(timerCount);
  }

  new Chart(document.getElementById('trendChart'), {
    type: 'bar',
    data: {
      labels: trendLabels,
      datasets: [
        { label:'提问数', data:trendQ, backgroundColor:'rgba(51,133,255,.7)', borderRadius:6, barPercentage:.35 },
        { label:'专注次数', data:trendTimer, backgroundColor:'rgba(24,180,125,.5)', borderRadius:6, barPercentage:.35 },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: { grid:{display:false}, ticks:{font:{size:11,family:'Noto Sans SC'}} },
        y: { beginAtZero:true, grid:{color:'rgba(51,133,255,.06)'}, ticks:{font:{size:11}, stepSize:1} }
      },
      plugins: {
        legend: { position:'top', align:'end', labels:{usePointStyle:true,pointStyleWidth:8,padding:16,font:{size:11,family:'Noto Sans SC'}} }
      }
    }
  });

  // Heatmap (4 weeks)
  const container = document.getElementById('heatmapContainer');
  container.innerHTML = '';
  for (let week = 0; week < 4; week++) {
    const row = document.createElement('div');
    row.className = 'heatmap-row';
    for (let day = 0; day < 7; day++) {
      const d = new Date(today);
      d.setDate(d.getDate() - (3 - week) * 7 - (6 - day));
      const key = `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
      let count = 0;
      data.all.forEach(s => { if (s.time && s.time.includes(key)) count += (s.messages||[]).length; });
      const cell = document.createElement('div');
      cell.className = 'heatmap-cell' + (count > 15 ? ' l4' : count > 8 ? ' l3' : count > 3 ? ' l2' : count > 0 ? ' l1' : '');
      cell.title = `${key}: ${count} 条消息`;
      row.appendChild(cell);
    }
    container.appendChild(row);
  }

  // Recent sessions
  const recentEl = document.getElementById('recentSessions');
  recentEl.innerHTML = '';
  const recent = data.all.slice(0, 6);
  if (recent.length === 0) {
    recentEl.innerHTML = '<div style="text-align:center;padding:30px 0;color:#94a3b8;font-size:13px">暂无对话记录<br><span style="font-size:11px">去 AI 伴学页面开始你的第一次对话吧</span></div>';
  }
  const sessionIcons = ['💬','📐','📖','🔬','💡','🎯'];
  const sessionColors = ['#eef6ff','#edfcf5','#fff8ed','#ede9fe','#fce7f3','#fff1f2'];
  recent.forEach((s, i) => {
    const msgCount = (s.messages||[]).length;
    const div = document.createElement('div');
    div.className = 'session-item';
    div.onclick = () => { window.location.href = 'ai-module.html'; };
    div.innerHTML = `
      <div class="session-icon" style="background:${sessionColors[i%6]}">${sessionIcons[i%6]}</div>
      <div class="session-info">
        <div class="session-title">${escHTML(s.title || '新对话')}</div>
        <div class="session-meta">${s.time || '未知时间'}</div>
      </div>
      <div class="session-count">${msgCount} 条</div>`;
    recentEl.appendChild(div);
  });

  // Weak points — 只显示有真实数据的学科
  const weakPoints = generateWeakPoints(data);
  const weakGrid = document.getElementById('weakGrid');
  weakGrid.innerHTML = '';
  const subjectColors = { '数学':'#3385ff', '语文':'#18b47d', '英语':'#ff9f38', '物理':'#8b5cf6', '化学':'#ec4899', '综合':'#64748b' };

  if (weakPoints.length === 0) {
    weakGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:32px 0;color:#94a3b8;font-size:13px">暂无数据<br><span style="font-size:11px;display:block;margin-top:4px">在 AI 伴学中提问或完成题目后，薄弱知识点将在此显示</span></div>';
  } else {
    weakPoints.forEach(wp => {
      const div = document.createElement('div');

        <div class="weak-bar"><div class="weak-bar-fill" style="width:0%;background:${subjectColors[wp.subject]||'#64748b'}"></div></div>`;
      weakGrid.appendChild(div);

    setTimeout(() => {

        bar.style.width = weakPoints[i].score + '%';

function generateWeakPoints(data) {
  const points = [];
  const subjects = ['数学','语文','英语','物理','化学'];
  const topicMap = {
    '数学': ['分数运算','几何图形面积','方程应用题','数据统计','比例问题','计算速度'],
    '语文': ['阅读理解','作文结构','成语运用','古诗词鉴赏','修辞手法','文言文翻译'],
    '英语': ['语法时态','词汇量','阅读理解','听力理解','写作表达','口语发音'],
    '物理': ['浮力计算','电路分析','力学平衡','光学反射','速度与加速度'],
    '化学': ['化学方程式','元素周期表','酸碱反应','实验操作','溶解度'],
  };

  // 错题本按学科统计
  const errorBySubj = {};
  const masteredBySubj = {};
  (data.errorBook || []).forEach(e => {
    const s = e.subject || '其他';
    errorBySubj[s] = (errorBySubj[s] || 0) + 1;
    if (e.mastered) masteredBySubj[s] = (masteredBySubj[s] || 0) + 1;
  });

  subjects.forEach(subj => {
    const chatCount = Math.floor(data.subjectData[subj] || 0); // AI提问次数
    const errCount = errorBySubj[subj] || 0;                   // 错题数
    const mastCount = masteredBySubj[subj] || 0;               // 已掌握错题数

    // 只有该学科有真实数据才显示
    if (chatCount === 0 && errCount === 0) return;

    const topics = topicMap[subj] || [];
    // 从错题本找该学科最近错的知识点，优先展示
    const errTopics = (data.errorBook || [])
      .filter(e => e.subject === subj && !e.mastered)
      .slice(0, 3)
      .map(e => e.question ? e.question.slice(0, 10) + '…' : null)
      .filter(Boolean);

    const topic = errTopics[0] || topics[Math.floor(Math.random() * topics.length)];

    // 掌握度：有错题时基于掌握率，纯提问时基于提问频率
    let score = 0;
    if (errCount > 0) {
      score = Math.round((mastCount / errCount) * 100);
    } else if (chatCount > 0) {
      // 提问越多，说明该科越活跃，掌握度根据提问量估算（上限70%）
      score = Math.min(70, Math.round(chatCount * 10));
    }

    points.push({ subject: subj, topic, score });
  });

  // 掌握度从低到高排列（最弱的在前）
  points.sort((a, b) => a.score - b.score);
  return points.slice(0, 6);
}

function generateAdvice(data) {
  const el = document.getElementById('aiAdviceText');
  const weakSubjects = [];
  const subjects = ['数学','语文','英语','物理','化学'];

  subjects.forEach(subj => {
    if ((data.subjectData[subj] || 0) < 2) weakSubjects.push(subj);
  });

  let advice = '';
  if (data.totalSessions === 0) {
    advice = '你还没有开始使用 AI 伴学助手。建议从你最薄弱的科目开始，每天至少和 AI 进行一次学习对话，持续一周就能看到明显提升！';
  } else if (data.engagementScore >= 80) {
    advice = `太棒了！你已经进行了 ${data.totalSessions} 次学习对话，学习参与度达到 ${data.engagementScore} 分。建议接下来重点突破薄弱知识点，可以让 AI 针对性地出题测试，巩固已学内容。`;
  } else if (data.engagementScore >= 40) {
    advice = `不错的学习节奏！目前参与度 ${data.engagementScore} 分。${weakSubjects.length > 0 ? '建议多和 AI 讨论 ' + weakSubjects.join('、') + ' 方面的问题，' : ''}保持每天提问的习惯，重点关注学科薄弱环节。`;
  } else {
    advice = `你刚开始使用 AI 伴学系统，建议每天花 15-20 分钟与 AI 对话学习。${weakSubjects.length > 0 ? '可以从 ' + weakSubjects.slice(0,2).join('、') + ' 开始，' : ''}让 AI 帮你制定系统的学习计划。`;
  }
  el.textContent = advice;
}

function goToAI() {
  const data = analyzeData();
  const prompt = `根据我的学情数据（${data.totalSessions}次对话，${data.userMessages}次提问，参与度${data.engagementScore}分），请分析我的学习情况并给出具体的改进建议和下周学习规划。`;
  sessionStorage.setItem('zhibanAIPrompt', prompt);
  window.location.href = 'ai-module.html';
}

function _syncNavUser(){
  try{
    const u=JSON.parse(localStorage.getItem('zhibanUser')||'{}');
    const av=document.getElementById('navAvatar'),nm=document.getElementById('navUserName');
    if(!av)return;
    if(u.isLoggedIn){
      if(u.customAvatar){av.innerHTML=`<img src="${u.customAvatar}" style="width:36px;height:36px;object-fit:cover;border-radius:50%">`;}
      else if(u.premiumAvatar){av.innerHTML=_renderPremiumAvatar(u.premiumAvatar,36);}
      else{av.innerHTML=_genAvatar(u.avatarIndex||0,36);}
      if(nm)nm.textContent=u.userName||'';
    }else{
      av.innerHTML='<svg class="w-5 h-5 text-ocean-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.5 20.25a8.25 8.25 0 0115 0"/></svg>';
      if(nm)nm.textContent='登录';
    }
  }catch(e){}
}
