<script>
let duration = 25 * 60, remaining = duration, isRunning = false, interval = null, currentNoise = null, noiseAudio = null;
const CIRCUMFERENCE = 2 * Math.PI * 130;

function setDuration(mins, btn) {
  if (isRunning) return; duration = mins * 60; remaining = duration; updateDisplay();
  document.querySelectorAll('[data-dur]').forEach(b => b.classList.remove('active')); btn.classList.add('active');
}
function updateDisplay() {
  var m = Math.floor(remaining / 60), s = remaining % 60;
  document.getElementById('timerDisplay').textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  var offset = CIRCUMFERENCE * (1 - remaining / duration); document.getElementById('timerProgress').style.strokeDashoffset = offset;
  var pct = remaining / duration;
  if (pct > 0.5) document.getElementById('timerProgress').setAttribute('stroke', '#3385ff');
  else if (pct > 0.2) document.getElementById('timerProgress').setAttribute('stroke', '#fbbf24');
  else document.getElementById('timerProgress').setAttribute('stroke', '#ef4444');
}
function toggleTimer() {
  if (isRunning) {
    clearInterval(interval); isRunning = false;
    document.getElementById('btnStart').textContent = '继续'; document.getElementById('btnStart').className = 'btn btn-start';
  } else {
    isRunning = true; document.getElementById('btnStart').textContent = '暂停'; document.getElementById('btnStart').className = 'btn btn-pause'; document.getElementById('timerPhase').textContent = '专注中...';
    interval = setInterval(function() { remaining--; updateDisplay(); if (remaining <= 0) { clearInterval(interval); isRunning = false; onComplete(); } }, 1000);
  }
}
function resetTimer() {
  clearInterval(interval); isRunning = false; remaining = duration; updateDisplay();
  document.getElementById('btnStart').textContent = '开始专注'; document.getElementById('btnStart').className = 'btn btn-start'; document.getElementById('timerPhase').textContent = '专注时间';
}
function onComplete() {
  document.getElementById('timerPhase').textContent = '🎉 专注完成！'; document.getElementById('btnStart').textContent = '开始专注'; document.getElementById('btnStart').className = 'btn btn-start';
  var mins = Math.round(duration / 60), pts = Math.max(5, Math.round(mins / 5) * 5);
  try { var u = JSON.parse(localStorage.getItem('zhibanUser') || '{}'); u.points = (u.points || 0) + pts; localStorage.setItem('zhibanUser', JSON.stringify(u)); } catch(e) {}
  if (window.sbUsers) sbUsers.update({ points: (JSON.parse(localStorage.getItem('zhibanUser')||'{}').points || 0) });
  var today = new Date().toISOString().slice(0,10), stats = JSON.parse(localStorage.getItem('zhibanTimerStats') || '{}');
  if (!stats[today]) stats[today] = { sessions: 0, minutes: 0, points: 0 };
  stats[today].sessions++; stats[today].minutes += mins; stats[today].points += pts;
  localStorage.setItem('zhibanTimerStats', JSON.stringify(stats));
  if (window.sbTimer) sbTimer.upsert(today, stats[today]);
  updateTodayStats(); remaining = duration; updateDisplay();
  var choice = confirm('🎉 专注完成！获得 ' + pts + ' 积分！\n\n趁热打铁，去AI伴学继续学习？');
  if(choice) window.location.href='ai-module.html';
}
function updateTodayStats() {
  var today = new Date().toISOString().slice(0,10), stats = JSON.parse(localStorage.getItem('zhibanTimerStats') || '{}');
  var t = stats[today] || { sessions: 0, minutes: 0, points: 0 };
  document.getElementById('todaySessions').textContent = t.sessions; document.getElementById('todayMinutes').textContent = t.minutes; document.getElementById('todayPoints').textContent = t.points;
}

var audioCtx = null, noiseNode = null, gainNode = null;
function toggleNoise(type, btn) {
  document.querySelectorAll('.noise-btn').forEach(b => { if (b !== btn && !b.dataset.dur) b.classList.remove('active'); });
  if (currentNoise === type) { stopNoise(); btn.classList.remove('active'); currentNoise = null; return; }
  stopNoise(); currentNoise = type; btn.classList.add('active');
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  var bufferSize = 2 * audioCtx.sampleRate, noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate), output = noiseBuffer.getChannelData(0);
  var freqMod = {rain: 0.3, forest: 0.5, ocean: 0.15, fire: 0.6, cafe: 0.8}, f = freqMod[type] || 0.5, lastOut = 0;
  for (var i = 0; i < bufferSize; i++) { var white = Math.random() * 2 - 1; output[i] = (lastOut + (f * white)) / (1 + f); lastOut = output[i]; output[i] *= 0.8; }
  noiseNode = audioCtx.createBufferSource(); noiseNode.buffer = noiseBuffer; noiseNode.loop = true; gainNode = audioCtx.createGain(); gainNode.gain.value = parseInt(document.getElementById('noiseVolume').value) / 100 * 0.5;
  noiseNode.connect(gainNode); gainNode.connect(audioCtx.destination); noiseNode.start();
}
function stopNoise() { if (noiseNode) { try { noiseNode.stop(); } catch(e) {} noiseNode = null; } }
function setVolume(v) { if (gainNode) gainNode.gain.value = v / 100 * 0.5; }

updateDisplay();
if (window.sbTimer) sbTimer.getAll().then(updateTodayStats).catch(function(){updateTodayStats();});
else updateTodayStats();
</script>
