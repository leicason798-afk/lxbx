<script>

/* === GAME LOGIC === */
let difficulty = 0; // 0=easy 1=medium 2=hard
let score=0, combo=0, maxCombo=0, correct=0, current=0, total=10;
let timeLeft=15, timer=null;
const CIRC = 2*Math.PI*16; // ~100.53

function selectDiff(d){
  difficulty=d;
  document.querySelectorAll('.diff-btn').forEach(b=>{
    b.style.borderWidth = b.dataset.d==d ? '3px':'2px';
    b.style.transform = b.dataset.d==d ? 'scale(1.08)':'scale(1)';
  });
}
selectDiff(0);

function showStart(){
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('gameScreen').classList.add('hidden');
}

function startGame(){
  score=0;combo=0;maxCombo=0;correct=0;current=0;
  total = [10,12,15][difficulty];
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');
  nextQuestion();
}

function generateQuestion(){
  const ops = difficulty===0 ? ['+','-'] : difficulty===1 ? ['+','-','×'] : ['+','-','×','÷'];
  const op = ops[Math.floor(Math.random()*ops.length)];
  let a,b,answer;
  switch(op){
    case '+': a=rnd(10,difficulty===2?200:difficulty===1?100:50);b=rnd(10,difficulty===2?200:difficulty===1?100:50);answer=a+b;break;
    case '-': a=rnd(20,difficulty===2?200:100);b=rnd(1,a);answer=a-b;break;
    case '×': a=rnd(2,difficulty===2?20:12);b=rnd(2,difficulty===2?20:12);answer=a*b;break;
    case '÷': b=rnd(2,difficulty===2?15:10);answer=rnd(2,difficulty===2?20:10);a=b*answer;break;
  }
  return {text:`${a} ${op} ${b} = ?`, answer};
}
function rnd(min,max){return Math.floor(Math.random()*(max-min+1))+min}

function nextQuestion(){
  if(current>=total){endGame();return;}
  current++;
  const q=generateQuestion();
  document.getElementById('questionText').textContent=q.text;
  window._currentMathQ = q;
  document.getElementById('questionLabel').textContent=`第 ${current} 题 / 共 ${total} 题`;
  document.getElementById('levelBadge').textContent=`第 ${current} 关`;
  document.getElementById('scoreDisplay').textContent=score;

  // Generate 4 options
  const opts=new Set([q.answer]);
  while(opts.size<4){
    const off=rnd(-10,10);
    if(off!==0) opts.add(q.answer+off);
  }
  const arr=[...opts].sort(()=>Math.random()-.5);

  const grid=document.getElementById('optionsGrid');
  grid.innerHTML='';
  arr.forEach(v=>{
    const btn=document.createElement('button');
    btn.className='option-btn';
    btn.textContent=v;
    btn.onclick=()=>checkAnswer(btn,v,q.answer);
    grid.appendChild(btn);
  });

  // Timer
  timeLeft=[15,12,10][difficulty];
  startTimer();
}

function startTimer(){
  clearInterval(timer);
  const maxTime=timeLeft;
  document.getElementById('timerText').textContent=timeLeft;
  document.getElementById('timerRing').style.strokeDashoffset='0';
  timer=setInterval(()=>{
    timeLeft--;
    document.getElementById('timerText').textContent=Math.max(0,timeLeft);
    document.getElementById('timerRing').style.strokeDashoffset=((maxTime-timeLeft)/maxTime*CIRC).toFixed(2);
    if(timeLeft<=3) document.getElementById('timerText').style.color='#ef4444';
    else document.getElementById('timerText').style.color='';
    if(timeLeft<=0){clearInterval(timer);handleTimeout();}
  },1000);
}

function handleTimeout(){
  combo=0;
  updateCombo();
  disableOptions();
  setTimeout(nextQuestion,800);
}

function checkAnswer(btn,val,ans){
  clearInterval(timer);
  disableOptions();
  if(val===ans){
    btn.classList.add('correct');
    correct++;combo++;
    if(combo>maxCombo)maxCombo=combo;
    const bonus=combo>=5?3:combo>=3?2:1;
    score+=10*bonus + Math.max(0,timeLeft);
    document.getElementById('scoreDisplay').textContent=score;
    updateCombo();
  }else{
    btn.classList.add('wrong');
    combo=0;
    updateCombo();
    // Save to error book
    if(window._currentMathQ){
      var eb=[];try{eb=JSON.parse(localStorage.getItem('zhibanErrorBook')||'[]')}catch(e){}
      var mq=window._currentMathQ;
      if(window._lastSavedMQ!==mq.text && !eb.find(function(x){return x.question===mq.text})){
        var opts=[ans,val,ans+Math.floor(Math.random()*5)+1,ans-Math.floor(Math.random()*5)-1];
        opts.sort(function(){return Math.random()-.5});
        window._lastSavedMQ=mq.text;
        eb.unshift({id:'err_'+Date.now(),subject:'数学',question:mq.text,options:opts.map(String),correctIdx:opts.indexOf(ans),userIdx:opts.indexOf(val),source:'数学速算',date:new Date().toLocaleDateString(),mastered:false,reviewCount:0});
        localStorage.setItem('zhibanErrorBook',JSON.stringify(eb));
        if(window.sbErrorBook){var _ne=eb[0];if(_ne&&_ne.id)sbErrorBook.add(_ne).catch(function(){});}
      }
    }
    // Show correct
    document.querySelectorAll('.option-btn').forEach(b=>{if(parseInt(b.textContent)===ans)b.classList.add('correct')});
  }
  setTimeout(nextQuestion,700);
}

function disableOptions(){document.querySelectorAll('.option-btn').forEach(b=>b.onclick=null)}

function updateCombo(){
  const t=document.getElementById('comboText');
  if(combo>=3){
    t.textContent=combo>=8?`🔥🔥🔥 ${combo}连击！超神！`:combo>=5?`🔥🔥 ${combo}连击！太强了！`:`🔥 ${combo}连击！`;
    t.style.opacity='1';
  }else{t.style.opacity='0';}
}

function endGame(){
  // Cross-module guidance
  setTimeout(function(){
    var eb=[];try{eb=JSON.parse(localStorage.getItem('zhibanErrorBook')||'[]')}catch(e){}
    var recent=eb.filter(function(e){return e.source==='数学速算'&&!e.mastered});
    if(recent.length>0){
      var tip=document.createElement('div');
      tip.style.cssText='text-align:center;margin-top:12px;padding:10px;border-radius:12px;background:#eef6ff;border:1px solid #bcdeff;font-size:13px;color:#1450e1';
      tip.innerHTML='📝 '+recent.length+'道错题已收入错题本，<a href="error-book.html" style="font-weight:700;text-decoration:underline">去复习 →</a>';
      var panel=document.getElementById('endScreen');
      if(panel)panel.appendChild(tip);
    }
  },500);
  clearInterval(timer);
  document.getElementById('finalScore').textContent=score;
  document.getElementById('finalCorrect').textContent=`${correct}/${total}`;
  document.getElementById('finalCombo').textContent=maxCombo;
  const pct=correct/total;
  document.getElementById('resultEmoji').textContent=pct>=.9?'🏆':pct>=.7?'🌟':pct>=.5?'💪':'📚';
  document.getElementById('resultSummary').textContent=pct>=.9?'你太棒了！速算小天才！':pct>=.7?'表现优秀，继续加油！':pct>=.5?'还不错，多练习会更好！':'再接再厉，勤能补拙！';
  document.getElementById('scoreOverlay').classList.add('active');
  document.getElementById('scorePopup').classList.add('active');
  const earned=score;_addPoints(earned);document.getElementById('earnedPts').textContent='+'+earned;
}
function closeScore(){
  document.getElementById('scoreOverlay').classList.remove('active');
  document.getElementById('scorePopup').classList.remove('active');
}

window.addEventListener('storage', function(e){
  if (e.key === 'zhibanUser') {
    try {
      var u = JSON.parse(e.newValue || '{}');
      var av = document.getElementById('navAvatar');
      var nm = document.getElementById('navUserName');
      if (!av) return;
      if (u.customAvatar) {
        av.innerHTML = '<img src="' + u.customAvatar + '" style="width:36px;height:36px;object-fit:cover;border-radius:50%">';
      }
      if (nm && u.userName) nm.textContent = u.userName;
    } catch(e) {}
  }
});
</script>
</body>
</html>
