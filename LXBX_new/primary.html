        /* ===== CSS VARIABLES ===== */
        :root {
            --nav-h: 64px;
            --blue-glow: 0 4px 30px rgba(51,133,255,.15);
            --card-shadow: 0 8px 32px rgba(20,37,87,.08);
            --card-hover: 0 12px 40px rgba(51,133,255,.18);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior: smooth; scroll-padding-top: var(--nav-h); }
        body { font-family:'Noto Sans SC',sans-serif; color:#1e293b; background:#f8faff; overflow-x:hidden; }

        /* ===== Decorative Background Mesh ===== */
        body::before {
            content:'';
            position:fixed; inset:0; z-index:-1;
            background:
                radial-gradient(ellipse 80% 50% at 20% 10%, rgba(51,133,255,.06) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(24,180,125,.05) 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 50% 50%, rgba(255,159,56,.03) 0%, transparent 60%);
        }

        /* ===== NAVBAR ===== */
        #navbar {
            transition: background .35s, box-shadow .35s, backdrop-filter .35s;
        }
        #navbar.scrolled {
            background: rgba(255,255,255,.82) !important;
            backdrop-filter: blur(16px) saturate(1.4);
            box-shadow: 0 1px 24px rgba(20,37,87,.07);
        }

        /* ===== CARDS ===== */
        .feature-card {
            background:#fff;
            border-radius:18px;
            box-shadow: var(--card-shadow);
            transition: transform .3s, box-shadow .3s;
            overflow:hidden;
        }
        .feature-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--card-hover);
        }

        /* ===== ACTION BTN ===== */
        .btn-primary {
            display:inline-flex; align-items:center; gap:6px;
            padding: 10px 28px;
            background: linear-gradient(135deg,#3385ff 0%,#1450e1 100%);
            color:#fff; border-radius:12px; font-weight:600; font-size:.95rem;
            transition: transform .25s, box-shadow .25s;
            border:none; cursor:pointer;
        }
        .btn-primary:hover {
            transform:translateY(-2px);
            box-shadow: 0 6px 20px rgba(51,133,255,.35);
        }

        /* ===== SECTION TITLE ===== */
        .section-title {
            font-family:'Noto Serif SC',serif;
            font-weight:700;
            position:relative;
            display:inline-block;
            padding-bottom:12px;
        }
        .section-title::after {
            content:'';
            position:absolute; bottom:0; left:50%; transform:translateX(-50%);
            width:48px; height:4px; border-radius:2px;
            background:linear-gradient(90deg,#3385ff,#18b47d);
        }

        /* ===== Mobile Menu ===== */
        #mobileMenu {
            transition: max-height .35s ease, opacity .3s;
            max-height:0; opacity:0; overflow:hidden;
        }
        #mobileMenu.open {
            max-height:400px; opacity:1;
        }

        /* ===== Inline SVG Avatar Generation ===== */
        .avatar-svg { border-radius:50%; }

        /* Subtle grain overlay */
        body::after {
            content:'';
            position:fixed; inset:0; z-index:-1;
            opacity:.018;
            background-image:url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* ═══ Unified Navbar ═══ */
        #navbar{background:rgba(255,255,255,.82);backdrop-filter:blur(16px) saturate(1.4);box-shadow:0 1px 24px rgba(20,37,87,.07);transition:background .35s,box-shadow .35s}
        .avatar-svg{border-radius:50%}
    </style>
</head>

        function generateModernCover(title, subject, type) {

                        <stop offset="0%" stop-color="${style.c1}" />
                        <stop offset="100%" stop-color="${style.c2}" />
                    </linearGradient>
                    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
                        <circle cx="2" cy="2" r="1.5" fill="#ffffff" opacity="0.15"/>

                <text x="200" y="176" font-family="sans-serif" font-size="14" font-weight="bold" fill="${style.txt}" text-anchor="middle">${style.icon} ${tag}</text>

        // 筛选课程和教材
        function filterCoursesAndTextbooks() {
            const gradeValue = document.getElementById('grade-filter').value;
            const subjectValue = document.getElementById('subject-filter').value;
            const versionValue = document.getElementById('version-filter').value;
            const searchValue = document.getElementById('search-input').value.toLowerCase();

            // 筛选课程
            const filteredCourses = courses.filter(course => {
                const matchesGrade = gradeValue === 'all' || course.grade === gradeValue;
                const matchesSubject = subjectValue === 'all' || course.subject === subjectValue;
                const matchesVersion = versionValue === 'all' || course.version === versionValue;
                const matchesSearch = searchValue === '' || 
                    course.title.toLowerCase().includes(searchValue) ||
                    getSubjectText(course.subject).toLowerCase().includes(searchValue) ||
                    getGradeText(course.grade).includes(searchValue) ||
                    getVersionText(course.version).toLowerCase().includes(searchValue);
                return matchesGrade && matchesSubject && matchesVersion && matchesSearch;
            });

            // 筛选教材
            const filteredTextbooks = textbooks.filter(textbook => {
                const matchesGrade = gradeValue === 'all' || textbook.grade === gradeValue;
                const matchesSubject = subjectValue === 'all' || textbook.subject === subjectValue;
                const matchesVersion = versionValue === 'all' || textbook.version === versionValue;
                const matchesSearch = searchValue === '' || 
                    textbook.title.toLowerCase().includes(searchValue) ||
                    getSubjectText(textbook.subject).toLowerCase().includes(searchValue) ||
                    getGradeText(textbook.grade).includes(searchValue) ||
                    getVersionText(textbook.version).toLowerCase().includes(searchValue);
                return matchesGrade && matchesSubject && matchesVersion && matchesSearch;
            });

            // 重新渲染
            renderCourses(filteredCourses);
            renderTextbooks(filteredTextbooks);
        }

        // 辅助函数：获取年级文本
        function getGradeText(grade) {
            const gradeMap = {
                '1': '一',
                '2': '二',
                '3': '三',
                '4': '四',
                '5': '五',
                '6': '六',
                '7': '七',
                '8': '八',
                '9': '九'
            };
            return gradeMap[grade] || grade;
        }

        // 辅助函数：获取科目文本
        function getSubjectText(subject) {
            const subjectMap = {
                'chinese': '语文',
                'math': '数学',
                'english': '英语',
                'science': '科学',
                'morality': '道德与法治',
                'physics': '物理',
                'chemistry': '化学',
                'biology': '生物',
                'history': '历史',
                'geography': '地理'
            };
            return subjectMap[subject] || subject;
        }

        // 辅助函数：获取教材版本文本
        function getVersionText(version) {
            const versionMap = {
                'people': '人教版',
                'beishida': '北师大版',
                'suzhou': '苏教版',
                '外研版': '外研版'
            };
            return versionMap[version] || version;
        }

        /* ===========================
           NAVBAR SCROLL
           =========================== */
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            navbar.classList.toggle('scrolled', window.scrollY > 30);
        });
        // Fire on load too
        navbar.classList.toggle('scrolled', window.scrollY > 30);

        /* ===========================
           MOBILE MENU
           =========================== */
        function toggleMobileMenu() {
            document.getElementById('mobileMenu').classList.toggle('open');
        }
        function closeMobileMenu() {
            document.getElementById('mobileMenu').classList.remove('open');
        }

        /* ═══ UNIFIED USER SYNC (共享) ═══ */
        const _avatarColors=[{bg:'#dbeafe',face:'#3b82f6',hair:'#1e40af',acc:'#60a5fa'},{bg:'#d1fae5',face:'#10b981',hair:'#065f46',acc:'#6ee7b7'},{bg:'#fef3c7',face:'#f59e0b',hair:'#92400e',acc:'#fcd34d'},{bg:'#fce7f3',face:'#ec4899',hair:'#9d174d',acc:'#f9a8d4'},{bg:'#e0e7ff',face:'#6366f1',hair:'#3730a3',acc:'#a5b4fc'},{bg:'#ffedd5',face:'#f97316',hair:'#9a3412',acc:'#fdba74'}];
        function _genAvatar(idx,size){const c=_avatarColors[idx%6];const st=[`<circle cx="32" cy="34" r="18" fill="${c.face}"/><ellipse cx="32" cy="20" rx="16" ry="12" fill="${c.hair}"/><circle cx="26" cy="33" r="2" fill="#fff"/><circle cx="38" cy="33" r="2" fill="#fff"/><path d="M28 40 Q32 44 36 40" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/>`,`<rect x="16" y="24" width="32" height="28" rx="10" fill="${c.face}"/><rect x="14" y="18" width="36" height="14" rx="7" fill="${c.hair}"/><rect x="18" y="14" width="28" height="8" rx="4" fill="${c.acc}"/><circle cx="26" cy="36" r="2" fill="#fff"/><circle cx="38" cy="36" r="2" fill="#fff"/>`,`<ellipse cx="32" cy="36" rx="16" ry="18" fill="${c.face}"/><ellipse cx="32" cy="22" rx="14" ry="10" fill="${c.hair}"/><circle cx="26" cy="35" r="5" stroke="#fff" stroke-width="1.5" fill="none"/><circle cx="38" cy="35" r="5" stroke="#fff" stroke-width="1.5" fill="none"/><circle cx="26" cy="35" r="1.5" fill="#fff"/><circle cx="38" cy="35" r="1.5" fill="#fff"/>`,`<circle cx="32" cy="36" r="16" fill="${c.face}"/><polygon points="18,24 14,10 26,20" fill="${c.hair}"/><polygon points="46,24 50,10 38,20" fill="${c.hair}"/><circle cx="26" cy="34" r="2" fill="#fff"/><circle cx="38" cy="34" r="2" fill="#fff"/>`,`<circle cx="32" cy="36" r="17" fill="${c.face}"/><ellipse cx="32" cy="22" rx="15" ry="10" fill="${c.hair}"/><polygon points="26,33 24,31 22,33 24,35" fill="#fff"/><polygon points="38,33 36,31 40,31 42,33 40,35 36,35" fill="#fff"/>`,`<rect x="16" y="22" width="32" height="30" rx="6" fill="${c.face}"/><rect x="20" y="16" width="24" height="10" rx="3" fill="${c.hair}"/><rect x="22" y="32" width="8" height="5" rx="2" fill="#fff"/><rect x="34" y="32" width="8" height="5" rx="2" fill="#fff"/>`];return`<svg viewBox="0 0 64 64" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg" class="avatar-svg"><rect width="64" height="64" rx="32" fill="${c.bg}"/>${st[idx%6]}</svg>`}

        // Sync navbar from localStorage
        document.addEventListener('DOMContentLoaded', function() {
            try {
                const u = JSON.parse(localStorage.getItem('zhibanUser') || '{}');
                const navAvatar = document.getElementById('navAvatar');
                const navUserName = document.getElementById('navUserName');
                if (navAvatar) {
                    navAvatar.innerHTML = _genAvatar(u.avatarIndex || 0, 36);
                }
                if (navUserName && u.userName) {
                    navUserName.textContent = u.userName;
                }
            } catch(e) {}
        });
    </script>
</body>
