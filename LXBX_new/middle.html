    <style>
        /* ===== CSS VARIABLES ===== */
        :root {
            --nav-h: 64px;
            --blue-glow: 0 4px 30px rgba(51,133,255,.15);
            --card-shadow: 0 8px 32px rgba(20,37,87,.08);
            --card-hover: 0 12px 40px rgba(51,133,255,.18);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior: smooth; scroll-padding-top: var(--nav-h); }
        body { font-family:'Noto Sans SC',sans-serif; color:#1e293b; background:#f8faff; overflow-x:hidden; }

        /* ===== Decorative Background Mesh ===== */
        body::before {
            content:'';
            position:fixed; inset:0; z-index:-1;
            background:
                radial-gradient(ellipse 80% 50% at 20% 10%, rgba(51,133,255,.06) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(24,180,125,.05) 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 50% 50%, rgba(255,159,56,.03) 0%, transparent 60%);
        }

        /* ===== NAVBAR ===== */
        #navbar {
            transition: background .35s, box-shadow .35s, backdrop-filter .35s;
        }
        #navbar.scrolled {
            background: rgba(255,255,255,.82) !important;
            backdrop-filter: blur(16px) saturate(1.4);
            box-shadow: 0 1px 24px rgba(20,37,87,.07);
        }

        /* ===== CARDS ===== */
        .feature-card {
            background:#fff;
            border-radius:18px;
            box-shadow: var(--card-shadow);
            transition: transform .3s, box-shadow .3s;
            overflow:hidden;
        }
        .feature-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--card-hover);
        }

        /* ===== ACTION BTN ===== */
        .btn-primary {
            display:inline-flex; align-items:center; gap:6px;
            padding: 10px 28px;
            background: linear-gradient(135deg,#3385ff 0%,#1450e1 100%);
            color:#fff; border-radius:12px; font-weight:600; font-size:.95rem;
            transition: transform .25s, box-shadow .25s;
            border:none; cursor:pointer;
        }
        .btn-primary:hover {
            transform:translateY(-2px);
            box-shadow: 0 6px 20px rgba(51,133,255,.35);
        }

        /* ===== SECTION TITLE ===== */
        .section-title {
            font-family:'Noto Serif SC',serif;
            font-weight:700;
            position:relative;
            display:inline-block;
            padding-bottom:12px;
        }
        .section-title::after {
            content:'';
            position:absolute; bottom:0; left:50%; transform:translateX(-50%);
            width:48px; height:4px; border-radius:2px;
            background:linear-gradient(90deg,#3385ff,#18b47d);
        }

        /* ===== Mobile Menu ===== */
        #mobileMenu {
            transition: max-height .35s ease, opacity .3s;
            max-height:0; opacity:0; overflow:hidden;
        }
        #mobileMenu.open {
            max-height:400px; opacity:1;
        }

        /* ===== Inline SVG Avatar Generation ===== */
        .avatar-svg { border-radius:50%; }

        /* Subtle grain overlay */
        body::after {
            content:'';
            position:fixed; inset:0; z-index:-1;
            opacity:.018;
            background-image:url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* ═══ Unified Navbar ═══ */
        #navbar{background:rgba(255,255,255,.82);backdrop-filter:blur(16px) saturate(1.4);box-shadow:0 1px 24px rgba(20,37,87,.07);transition:background .35s,box-shadow .35s}
        .avatar-svg{border-radius:50%}
    </style>
</head>

        function generateModernCover(title, subject, type) {
            const style = MODERN_COLORS[subject] || MODERN_COLORS.default;
            const t = title.length > 12 ? title.slice(0,11) + '...' : title;
            const tag = type === 'course' ? '同步课程' : '电子教材';
            
            const svg = `
            <svg xmlns="http://www.w3.org/2000/svg" width="400" height="240" viewBox="0 0 400 240">
                <defs>
                    <linearGradient id="g_${subject}" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="${style.c1}" />
                        <stop offset="100%" stop-color="${style.c2}" />
                    </linearGradient>
                    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
                        <circle cx="2" cy="2" r="1.5" fill="#ffffff" opacity="0.15"/>
                    </pattern>
                </defs>
                <rect width="400" height="240" fill="url(#g_${subject})" />
                <rect width="400" height="240" fill="url(#dots)" />
                <circle cx="350" cy="40" r="90" fill="#ffffff" opacity="0.1" />
                <circle cx="40" cy="210" r="70" fill="#ffffff" opacity="0.1" />
                <rect x="30" y="40" width="340" height="160" rx="16" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="2" />
                <text x="200" y="125" font-family="sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle" style="text-shadow: 0 2px 8px rgba(0,0,0,0.15);">${t}</text>
                <rect x="140" y="155" width="120" height="30" rx="15" fill="rgba(255,255,255,0.9)" />
                <text x="200" y="176" font-family="sans-serif" font-size="14" font-weight="bold" fill="${style.txt}" text-anchor="middle">${style.icon} ${tag}</text>
            </svg>`;
            return svgB64(svg);
        }

        function generateCourseCover(title, subject) {
            return generateModernCover(title, subject, 'course');
        }
        function generateTextbookCover(title, subject) {

        // 筛选课程和教材
        function filterCoursesAndTextbooks() {
            const gradeValue = document.getElementById('grade-filter').value;
            const subjectValue = document.getElementById('subject-filter').value;
            const versionValue = document.getElementById('version-filter').value;
            const searchValue = document.getElementById('search-input').value.toLowerCase();

            // 筛选课程
            const filteredCourses = courses.filter(course => {
                const matchesGrade = gradeValue === 'all' || course.grade === gradeValue;
                const matchesSubject = subjectValue === 'all' || course.subject === subjectValue;
                const matchesVersion = versionValue === 'all' || course.version === versionValue;
                const matchesSearch = searchValue === '' || 
                    course.title.toLowerCase().includes(searchValue) ||
                    getSubjectText(course.subject).toLowerCase().includes(searchValue) ||
                    getGradeText(course.grade).includes(searchValue) ||
                    getVersionText(course.version).toLowerCase().includes(searchValue);
                return matchesGrade && matchesSubject && matchesVersion && matchesSearch;
            });

            // 筛选教材
            const filteredTextbooks = textbooks.filter(textbook => {
                const matchesGrade = gradeValue === 'all' || textbook.grade === gradeValue;
                const matchesSubject = subjectValue === 'all' || textbook.subject === subjectValue;
                const matchesVersion = versionValue === 'all' || textbook.version === versionValue;
                const matchesSearch = searchValue === '' || 
                    textbook.title.toLowerCase().includes(searchValue) ||
                    getSubjectText(textbook.subject).toLowerCase().includes(searchValue) ||
                    getGradeText(textbook.grade).includes(searchValue) ||
                    getVersionText(textbook.version).toLowerCase().includes(searchValue);
                return matchesGrade && matchesSubject && matchesVersion && matchesSearch;
            });

            // 重新渲染
            renderCourses(filteredCourses);
            renderTextbooks(filteredTextbooks);
        }

        // 辅助函数：获取年级文本
        function getGradeText(grade) {
            const gradeMap = {
                '1': '一',
                '2': '二',
                '3': '三',
                '4': '四',
                '5': '五',
                '6': '六',
                '7': '七',
                '8': '八',
                '9': '九'
            };
            return gradeMap[grade] || grade;
        }

        // 辅助函数：获取科目文本
        function getSubjectText(subject) {
            const subjectMap = {
                'chinese': '语文',
                'math': '数学',
                'english': '英语',
                'science': '科学',
                'morality': '道德与法治',
                'physics': '物理',
                'chemistry': '化学',
                'biology': '生物',
                'history': '历史',
                'geography': '地理'
            };
            return subjectMap[subject] || subject;
        }

        function getVersionText(version) {
            const versionMap = {
                'people': '人教版',
                'beishida': '北师大版',
                'suzhou': '苏教版',
                '外研版': '外研版'
