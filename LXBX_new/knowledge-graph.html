<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',system-ui,sans-serif;background:#04091e;min-height:100vh;color:#e2e8f0;overflow:hidden}

/* Particle canvas background */
#particleCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}
#graphCanvas{position:relative;z-index:1;cursor:grab}
#graphCanvas:active{cursor:grabbing}

/* Glassmorphism navbar */
#navbar{background:rgba(4,9,30,.75);backdrop-filter:blur(24px) saturate(1.6);border-bottom:1px solid rgba(80,140,255,.1);box-shadow:0 4px 30px rgba(0,0,0,.5)}

/* Glass buttons */
.glass-btn{padding:7px 18px;border-radius:24px;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#94a3b8;font-size:13px;cursor:pointer;transition:all .3s;font-family:inherit;font-weight:500;backdrop-filter:blur(8px)}
.glass-btn:hover{border-color:rgba(51,133,255,.4);color:#93c5fd;background:rgba(51,133,255,.08)}
.glass-btn.active{border-color:#3385ff;background:rgba(51,133,255,.12);color:#60a5fa;box-shadow:0 0 15px rgba(51,133,255,.15)}

/* Glass info panel */
#infoPanel{position:fixed;right:20px;top:80px;width:380px;max-height:calc(100vh - 100px);
  background:rgba(15,23,42,.65);backdrop-filter:blur(28px) saturate(1.5);
  border-radius:22px;padding:0;border:1px solid rgba(51,133,255,.1);
  display:none;overflow:hidden;z-index:10;
  box-shadow:0 20px 60px rgba(0,0,0,.4),0 0 40px rgba(51,133,255,.05)}
#infoPanel.show{display:flex;flex-direction:column;animation:slideIn .35s ease-out}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

.panel-header{padding:24px 24px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
.panel-body{padding:20px 24px;overflow-y:auto;flex:1}
.panel-footer{padding:16px 24px 20px;border-top:1px solid rgba(255,255,255,.06)}

/* Glow button */
.glow-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px 20px;border-radius:14px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .3s;font-family:inherit}
.glow-btn-primary{background:linear-gradient(135deg,#3385ff,#18b47d);color:#fff;box-shadow:0 4px 20px rgba(51,133,255,.25)}
.glow-btn-primary:hover{box-shadow:0 6px 30px rgba(51,133,255,.4);transform:translateY(-1px)}
.glow-btn-secondary{background:rgba(255,255,255,.06);color:#93c5fd;border:1px solid rgba(51,133,255,.2)}
.glow-btn-secondary:hover{background:rgba(51,133,255,.1);border-color:rgba(51,133,255,.4)}

/* Mind map tree */
.mind-map{padding:16px;background:rgba(255,255,255,.03);border-radius:16px;border:1px solid rgba(255,255,255,.05)}
.mm-root{font-size:16px;font-weight:700;color:#60a5fa;margin-bottom:12px;padding-left:8px;border-left:3px solid #3385ff}
.mm-branch{margin-left:20px;position:relative}
.mm-branch::before{content:'';position:absolute;left:-12px;top:0;bottom:0;width:1px;background:rgba(255,255,255,.08)}
.mm-item{position:relative;padding:6px 0 6px 16px;font-size:13px;color:#cbd5e1;line-height:1.6}
.mm-item::before{content:'';position:absolute;left:0;top:14px;width:10px;height:1px;background:rgba(51,133,255,.3)}
.mm-item .mm-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:8px}

/* Glass legend */
.glass-legend{position:fixed;left:16px;bottom:16px;z-index:10;
  background:rgba(15,23,42,.55);backdrop-filter:blur(20px);
  border-radius:16px;padding:16px 20px;border:1px solid rgba(255,255,255,.06);
  font-size:12px;color:#94a3b8}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}

/* Floating hint */
.float-hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;
  background:rgba(15,23,42,.6);backdrop-filter:blur(16px);
  border-radius:24px;padding:8px 20px;border:1px solid rgba(255,255,255,.06);
  font-size:12px;color:#64748b;white-space:nowrap}
</style>
</head>
<body>

<!-- Particle background -->
<canvas id="particleCanvas"></canvas>

<!-- Navbar -->
<nav id="navbar" class="fixed top-0 left-0 w-full z-50" style="height:64px">

      <span style="font-family:'Noto Serif SC',serif">知识图谱</span>

<!-- Legend -->
<div class="glass-legend">
  <p class="font-semibold text-white mb-2">图例</p>
  <p><span class="legend-dot" style="background:#f5a623"></span>学科核心（金色大节点）</p>
  <p><span class="legend-dot" style="background:#4fc3f7"></span>语文知识点</p>
  <p><span class="legend-dot" style="background:#5b9bd5"></span>数学知识点</p>
  <p><span class="legend-dot" style="background:#5ba87e"></span>英语知识点</p>
</div>

<!-- Float hint -->
<div class="float-hint">点击节点查看思维导图 · 滚轮缩放 · 拖拽移动</div>

<!-- Info Panel -->
<div id="infoPanel">
  <div class="panel-header">
    <div class="flex justify-between items-start">
      <div>
        <h3 id="infoTitle" class="text-lg font-bold text-white mb-1"></h3>
        <p id="infoSubject" class="text-xs text-slate-400"></p>
      </div>
      <button onclick="document.getElementById('infoPanel').classList.remove('show')" class="w-8 h-8 rounded-lg bg-white/5 hover:bg-white/10 flex items-center justify-center text-slate-400 hover:text-white transition">&times;</button>
    </div>
  </div>
  <div class="panel-body">
    <p id="infoDesc" class="text-sm text-slate-300 leading-relaxed mb-4"></p>
    <p id="infoRelated" class="text-xs text-slate-500 mb-5"></p>
    
    <!-- Mind Map -->
    <div class="mind-map" id="mindMapArea">
      <div class="mm-root" id="mmRoot"></div>
      <div class="mm-branch" id="mmBranch"></div>
    </div>
  </div>
  <div class="panel-footer" style="display:flex;flex-direction:column;gap:8px">
    <button class="glow-btn glow-btn-primary" id="askAIBtn" onclick="askAI()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
      还有不懂？向AI提问
    </button>
    <button class="glow-btn glow-btn-secondary" onclick="document.getElementById('infoPanel').classList.remove('show')">关闭</button>
  </div>
</div>

<!-- Zoom controls -->
<div style="position:fixed;bottom:24px;right:24px;z-index:100;display:flex;flex-direction:column;gap:8px">
  <button onclick="zoomIn()" style="width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,0.12);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.18);color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s" onmouseover="this.style.background='rgba(51,133,255,0.35)'" onmouseout="this.style.background='rgba(255,255,255,0.12)'">+</button>
  <button onclick="zoomOut()" style="width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,0.12);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.18);color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s" onmouseover="this.style.background='rgba(51,133,255,0.35)'" onmouseout="this.style.background='rgba(255,255,255,0.12)'">−</button>
  <button onclick="resetView()" style="width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,0.12);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.18);color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s" onmouseover="this.style.background='rgba(51,133,255,0.35)'" onmouseout="this.style.background='rgba(255,255,255,0.12)'">⌂</button>
</div>

<script>

const COLORS = {'语文':'#18b47d','数学':'#3385ff','英语':'#ff9f38'};
// Hub = large gold; child nodes use per-subject palettes matching reference image
const HUB_COLOR = '#f5a623';
const SUBJECT_CHILD = {
  '语文': {stroke:'#4fc3f7', fill:'#1a3a5c', text:'#a0d8ef'},
  '数学': {stroke:'#5b9bd5', fill:'#1a2f4a', text:'#90c8ff'},
  '英语': {stroke:'#5ba87e', fill:'#1a3530', text:'#90ddb0'},
};
let currentInfoNode = null;

/* === PARTICLE SYSTEM === */
let particles = [];
const PARTICLE_COUNT = 80;

function initParticles(w, h) {
  particles = [];
  for (var i = 0; i < PARTICLE_COUNT; i++) {
    particles.push({
      x: Math.random() * w, y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.25, vy: (Math.random() - 0.5) * 0.25,
      r: Math.random() * 1.2 + 0.3, a: Math.random() * 0.18 + 0.04
    });
  }
}

function drawParticles(ctx, w, h) {
  particles.forEach(function(p) {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
    if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(80,160,255,' + p.a + ')'; ctx.fill();
  });
  for (var i = 0; i < particles.length; i++) {
    for (var j = i + 1; j < particles.length; j++) {
      var dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
      var dist=Math.sqrt(dx*dx+dy*dy);
      if (dist < 100) {
        ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y);
        ctx.strokeStyle='rgba(80,160,255,'+(0.05*(1-dist/100))+')'; ctx.lineWidth=0.4; ctx.stroke();
      }
    }
  }
}

/* === FORCE GRAPH === */
let nodes = [], edges = [];
let canvas, ctx, W, H;
let pCanvas, pCtx;
let offsetX = 0, offsetY = 0, scale = 1;
let dragNode = null, panStart = null;
let hoveredNode = null;
// animation tick for pulsing
let tick = 0;

function buildGraph(subject) {
  nodes = []; edges = [];
  var subjects = subject === 'all' ? Object.keys(KNOWLEDGE) : [subject];

  // Hub positions — spread wide to fill screen like reference
  var cols = subjects.length;
  var hubPos = {};
  subjects.forEach(function(subj, i) {
    var frac = cols === 1 ? 0.5 : (i / (cols - 1)) * 0.7 + 0.15;
    hubPos[subj] = { x: W * frac, y: H * (0.35 + Math.sin(i * 1.2) * 0.08) };
  });

  subjects.forEach(function(subj) {
    var hpos = hubPos[subj];
    var sc = SUBJECT_CHILD[subj] || {stroke:'#5b9bd5',fill:'#1a2f4a',text:'#90c8ff'};

    // Hub node
    nodes.push({
      id: 'hub_'+subj, name: subj, desc: subj+'核心知识体系',
      subject: subj, isHub: true,
      x: hpos.x + (Math.random()-0.5)*20,
      y: hpos.y + (Math.random()-0.5)*20,
      vx:0, vy:0, r: 48,
      hubColor: HUB_COLOR, sc: sc, related:[], mindmap:[]
    });

    // Child nodes in orbit
    var kids = KNOWLEDGE[subj];
    kids.forEach(function(k, idx) {
      var angle = (idx / kids.length) * Math.PI * 2 - Math.PI/2;
      var dist = 160 + (idx % 3) * 30;
      nodes.push({
        id: k.id, name: k.name, desc: k.desc,
        subject: subj, isHub: false,
        x: hpos.x + Math.cos(angle)*dist + (Math.random()-0.5)*30,
        y: hpos.y + Math.sin(angle)*dist + (Math.random()-0.5)*30,
        vx:0, vy:0, r: 18,
        sc: sc, related: k.related, mindmap: k.mindmap, hubId:'hub_'+subj
      });
      edges.push({a:'hub_'+subj, b:k.id, type:'hub'});
    });
  });

  // Child-child related edges
  nodes.forEach(function(n) {
    if (n.isHub) return;
    (n.related||[]).forEach(function(rid) {
      var target = nodes.find(function(m){return m.id===rid;});
      if (target && !edges.find(function(e){
        return (e.a===n.id&&e.b===rid)||(e.a===rid&&e.b===n.id);
      })) {
        edges.push({a:n.id, b:rid, type:'related'});
      }
    });
  });

  // Cross-subject hub edges
  var hubs = nodes.filter(function(n){return n.isHub;});
  for (var i=0;i<hubs.length-1;i++) {
    edges.push({a:hubs[i].id, b:hubs[i+1].id, type:'cross'});
  }
  if (hubs.length>2) edges.push({a:hubs[0].id, b:hubs[hubs.length-1].id, type:'cross'});

  // Extra cross-subject child connections (make graph denser)
  if (subjects.length > 1) {
    var pairs = [
      ['yw4','yy4'],['yw5','yy5'],['yw3','yy2'],['sx7','yw4'],
      ['sx3','sx4'],['yy1','yy2'],['yw1','yw9'],['sx13','sx11'],
      ['yy4','yy11'],['yw5','yw12'],['sx7','sx14']
    ];
    pairs.forEach(function(p) {
      var na=nodes.find(function(n){return n.id===p[0];});
      var nb=nodes.find(function(n){return n.id===p[1];});
      if (na && nb && !edges.find(function(e){
        return (e.a===p[0]&&e.b===p[1])||(e.a===p[1]&&e.b===p[0]);
      })) {
        edges.push({a:p[0], b:p[1], type:'cross'});
      }
    });
  }
}

function simulate() {
  tick++;
  // Repulsion between all nodes
  for (var i=0;i<nodes.length;i++) {
    for (var j=i+1;j<nodes.length;j++) {
      var dx=nodes[j].x-nodes[i].x, dy=nodes[j].y-nodes[i].y;
      var dist=Math.sqrt(dx*dx+dy*dy)||1;
      var minD=nodes[i].r+nodes[j].r+35;
      if (dist < minD*2.5) {
        var f=6000/(dist*dist);
        var fx=dx/dist*f, fy=dy/dist*f;
        nodes[i].vx-=fx; nodes[i].vy-=fy;
        nodes[j].vx+=fx; nodes[j].vy+=fy;
      }
    }
  }
  // Spring forces along edges
  edges.forEach(function(e) {
    var a=nodes.find(function(n){return n.id===e.a;});
    var b=nodes.find(function(n){return n.id===e.b;});
    if(!a||!b) return;
    var dx=b.x-a.x, dy=b.y-a.y, dist=Math.sqrt(dx*dx+dy*dy)||1;
    var ideal = e.type==='hub' ? (a.r+b.r+80)
               : e.type==='cross' ? (a.r+b.r+120)
               : (a.r+b.r+70);
    var f=(dist-ideal)*0.022;
    a.vx+=dx/dist*f; a.vy+=dy/dist*f;
    b.vx-=dx/dist*f; b.vy-=dy/dist*f;
  });
  // Gravity toward center
  nodes.forEach(function(n) {
    if (n.isHub) { n.vx*=0.72; n.vy*=0.72; }
    else {
      n.vx+=(W/2-n.x)*0.0004;
      n.vy+=(H/2-n.y)*0.0004;
    }
    if(n!==dragNode){ n.x+=n.vx*0.28; n.y+=n.vy*0.28; }
    n.vx*=0.84; n.vy*=0.84;
    // Clamp to canvas bounds with padding
    var pad=n.r+60;
    if(n.x<pad)n.x=pad; if(n.x>W-pad)n.x=W-pad;
    if(n.y<pad+64)n.y=pad+64; if(n.y>H-pad)n.y=H-pad;
  });
}

function draw() {
  ctx.clearRect(0,0,W,H);
  pCtx.clearRect(0,0,W,H);
  drawParticles(pCtx,W,H);

  ctx.save();
  ctx.translate(offsetX,offsetY);
  ctx.scale(scale,scale);

  // ── Draw edges first ──
  edges.forEach(function(e) {
    var a=nodes.find(function(n){return n.id===e.a;});
    var b=nodes.find(function(n){return n.id===e.b;});
    if(!a||!b) return;
    var hov=(hoveredNode===a||hoveredNode===b);
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
    if (e.type==='hub') {
      ctx.strokeStyle = hov ? 'rgba(245,166,35,0.7)' : 'rgba(245,166,35,0.25)';
      ctx.lineWidth = hov ? 2 : 1;
      ctx.setLineDash([]);
    } else if (e.type==='cross') {
      ctx.strokeStyle = hov ? 'rgba(148,163,184,0.5)' : 'rgba(148,163,184,0.12)';
      ctx.lineWidth = hov ? 1.5 : 0.8;
      ctx.setLineDash([8,8]);
    } else {
      var sc=a.sc||{stroke:'#5b9bd5'};
      ctx.strokeStyle = hov ? sc.stroke+'cc' : sc.stroke+'55';
      ctx.lineWidth = hov ? 1.5 : 0.9;
      ctx.setLineDash([4,5]);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // ── Draw nodes ──
  nodes.forEach(function(n) {
    var hov=(hoveredNode===n);
    var pulse = Math.sin(tick*0.04)*0.5+0.5; // 0..1 oscillating

    if (n.isHub) {
      // ── LARGE GOLDEN HUB (like reference image) ──
      var r=n.r;
      // Outer ring pulse
      ctx.beginPath(); ctx.arc(n.x,n.y,r+16+pulse*4,0,Math.PI*2);
      ctx.strokeStyle='rgba(245,166,35,'+(0.15+pulse*0.1)+')';
      ctx.lineWidth=1.5; ctx.stroke();
      // Second ring
      ctx.beginPath(); ctx.arc(n.x,n.y,r+8,0,Math.PI*2);
      ctx.strokeStyle='rgba(245,166,35,0.35)'; ctx.lineWidth=1; ctx.stroke();
      // Glow halo
      var grd=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,r+40);
      grd.addColorStop(0,'rgba(245,166,35,0.35)'); grd.addColorStop(1,'rgba(245,166,35,0)');
      ctx.beginPath(); ctx.arc(n.x,n.y,r+40,0,Math.PI*2);
      ctx.fillStyle=grd; ctx.fill();
      // Body
      ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2);
      var bg=ctx.createRadialGradient(n.x-r*.3,n.y-r*.3,0,n.x,n.y,r);
      bg.addColorStop(0,'#fff8e1'); bg.addColorStop(0.35,HUB_COLOR); bg.addColorStop(1,'#b45309');
      ctx.fillStyle=bg; ctx.fill();
      // Border
      ctx.strokeStyle=hov?'#fff':'rgba(255,220,100,0.9)'; ctx.lineWidth=hov?3:2; ctx.stroke();
      // Inner highlight
      ctx.beginPath(); ctx.arc(n.x-r*.25,n.y-r*.28,r*.22,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.28)'; ctx.fill();
      // Label — center of node
      ctx.fillStyle='#fff';
      ctx.font='bold 14px "Noto Sans SC",sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(n.name, n.x, n.y);

    } else {
      // ── SMALL CHILD NODE (blue, like reference) ──
      var sc=n.sc||{stroke:'#5b9bd5',fill:'#1a2f4a',text:'#90c8ff'};
      var r=n.r;
      // Hover glow
      if (hov) {
        var hgrd=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,r+22);
        hgrd.addColorStop(0,sc.stroke+'88'); hgrd.addColorStop(1,sc.stroke+'00');
        ctx.beginPath(); ctx.arc(n.x,n.y,r+22,0,Math.PI*2);
        ctx.fillStyle=hgrd; ctx.fill();
      }
      // Body fill — dark navy with colored border (like reference)
      ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2);
      var nbg=ctx.createRadialGradient(n.x-r*.3,n.y-r*.3,0,n.x,n.y,r);
      nbg.addColorStop(0,'rgba(255,255,255,0.18)');
      nbg.addColorStop(0.4,sc.fill);
      nbg.addColorStop(1,'rgba(10,20,40,0.9)');
      ctx.fillStyle=nbg; ctx.fill();
      // Border — bright colored
      ctx.strokeStyle=hov?'#fff':sc.stroke+'dd'; ctx.lineWidth=hov?2:1.2; ctx.stroke();
      // Inner glow dot
      ctx.beginPath(); ctx.arc(n.x-r*.3,n.y-r*.3,r*.2,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.32)'; ctx.fill();
      // Label OUTSIDE node (below, like reference image)
      ctx.fillStyle=hov?'#ffffff':sc.text;
      var fs=n.name.length>5?'10px':'11px';
      ctx.font=(hov?'bold ':'')+fs+' "Noto Sans SC",sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='top';
      // Short label inside circle, full name below
      var shortLabel=n.name.length>4?n.name.slice(0,4):n.name;
      ctx.fillStyle='rgba(255,255,255,0.9)';
      ctx.font='bold 9px "Noto Sans SC",sans-serif';
      ctx.textBaseline='middle';
      ctx.fillText(shortLabel, n.x, n.y);
      // Full label below node
      ctx.fillStyle=hov?'#ffffff':sc.text;
      ctx.font=(hov?'bold ':'')+fs+' "Noto Sans SC",sans-serif';
      ctx.textBaseline='top';
      var fullLabel=n.name.length>8?n.name.slice(0,7)+'…':n.name;
      ctx.shadowColor=sc.stroke; ctx.shadowBlur=4;
      ctx.fillText(fullLabel, n.x, n.y+r+4);
      ctx.shadowBlur=0;
    }
  });

  ctx.restore();
}

function loop(){simulate();draw();requestAnimationFrame(loop);}

function switchSubject(subj,btn){
  document.querySelectorAll('.glass-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  buildGraph(subj);
}

function getNodeAt(mx,my){
  var x=(mx-offsetX)/scale, y=(my-offsetY)/scale;
  for(var i=nodes.length-1;i>=0;i--){
    var n=nodes[i], dx=x-n.x, dy=y-n.y;
    if(dx*dx+dy*dy<=n.r*n.r) return n;
  }
  return null;
}

function showInfo(node){
  currentInfoNode = node;
  document.getElementById('infoTitle').textContent=node.name;
  document.getElementById('infoSubject').textContent=node.subject+' · 知识点';
  document.getElementById('infoDesc').textContent=node.desc;
  var related=(node.related||[]).map(function(rid){var n=nodes.find(function(m){return m.id===rid});return n?n.name:''}).filter(Boolean);
  document.getElementById('infoRelated').textContent='关联知识点：'+(related.join('、')||'无');
  
  // Build mind map
  document.getElementById('mmRoot').textContent=node.name+' 思维导图';
  var branch=document.getElementById('mmBranch');
  branch.innerHTML='';
  var dotColor = COLORS[node.subject] || '#3385ff';
  (node.mindmap||[]).forEach(function(item){
    var div=document.createElement('div');
    div.className='mm-item';
    div.innerHTML='<span class="mm-dot" style="background:'+dotColor+'"></span>'+item;
    branch.appendChild(div);
  });
  
  document.getElementById('infoPanel').classList.add('show');
}

function askAI(){
  if(!currentInfoNode) return;
  var q = '请详细讲解'+currentInfoNode.subject+'中的「'+currentInfoNode.name+'」知识点，包括核心概念、重要公式和解题技巧';
  window.location.href = 'ai-module.html?prompt='+encodeURIComponent(q);
}

let _pinchDist=null,_pinchScale=1;
function zoomIn(){scale=Math.min(4,scale*1.2);}
function zoomOut(){scale=Math.max(0.2,scale/1.2);}

// Init
window.addEventListener('load',function(){
  canvas=document.getElementById('graphCanvas');
  ctx=canvas.getContext('2d');
  pCanvas=document.getElementById('particleCanvas');
  pCtx=pCanvas.getContext('2d');
  W=canvas.width=pCanvas.width=window.innerWidth;
  H=canvas.height=pCanvas.height=window.innerHeight;
  
  initParticles(W,H);
  buildGraph('all');
  loop();
  
  var _dragged=false;
  canvas.addEventListener('mousedown',function(e){
    var n=getNodeAt(e.clientX,e.clientY);
    if(n){dragNode=n;_dragged=false;}
    else{panStart={x:e.clientX-offsetX,y:e.clientY-offsetY};}
  });
  canvas.addEventListener('mousemove',function(e){
    hoveredNode=getNodeAt(e.clientX,e.clientY);
    canvas.style.cursor=hoveredNode?'pointer':(panStart?'grabbing':'grab');
    if(dragNode){
      dragNode.x=(e.clientX-offsetX)/scale;
      dragNode.y=(e.clientY-offsetY)/scale;
      _dragged=true;
    }
    if(panStart){offsetX=e.clientX-panStart.x;offsetY=e.clientY-panStart.y;}
  });
  canvas.addEventListener('mouseup',function(e){
    if(dragNode&&!_dragged){var n=getNodeAt(e.clientX,e.clientY);if(n)showInfo(n);}
    if(!dragNode&&!panStart){var n2=getNodeAt(e.clientX,e.clientY);if(n2)showInfo(n2);}
    dragNode=null;panStart=null;
  });
  canvas.addEventListener('wheel',function(e){
    e.preventDefault();
    scale*=e.deltaY>0?0.92:1.08;
    scale=Math.max(0.3,Math.min(3,scale));
  });
  canvas.addEventListener('touchstart',function(e){
    if(e.touches.length===2){
      _pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      _pinchScale=scale;
      return;
    }
    var t=e.touches[0];var n=getNodeAt(t.clientX,t.clientY);
    if(n){dragNode=n;showInfo(n);}
    else{panStart={x:t.clientX-offsetX,y:t.clientY-offsetY};}
  });
  canvas.addEventListener('touchmove',function(e){
    e.preventDefault();
    if(e.touches.length===2&&_pinchDist){
      var dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      scale=Math.max(0.2,Math.min(4,_pinchScale*(dist/_pinchDist)));
      return;
    }
    if(dragNode&&e.touches[0]){
      dragNode.x=(e.touches[0].clientX-offsetX)/scale;
      dragNode.y=(e.touches[0].clientY-offsetY)/scale;
    }
    if(panStart&&e.touches[0]){offsetX=e.touches[0].clientX-panStart.x;offsetY=e.touches[0].clientY-panStart.y;}
  },{passive:false});
  canvas.addEventListener('touchend',function(){dragNode=null;panStart=null;_pinchDist=null;});
  window.addEventListener('resize',function(){
    W=canvas.width=pCanvas.width=window.innerWidth;
    H=canvas.height=pCanvas.height=window.innerHeight;
    initParticles(W,H);
  });
});
</script>

// 监听页面切换和storage变化，实时同步
window.addEventListener('focus', function(){ try{ document.querySelector('[data-nav-sync]') && document.querySelector('[data-nav-sync]').dispatchEvent(new Event('sync')); } catch(e){} });
window.addEventListener('pageshow', function(){

    var u = JSON.parse(localStorage.getItem('zhibanUser') || '{}');

  } catch(e) {}
});
window.addEventListener('storage', function(e){
  if (e.key === 'zhibanUser') {
    try {
      var u = JSON.parse(e.newValue || '{}');
      var av = document.getElementById('navAvatar');
      var nm = document.getElementById('navUserName');
      if (!av) return;
      if (u.customAvatar) {
        av.innerHTML = '<img src="' + u.customAvatar + '" style="width:36px;height:36px;object-fit:cover;border-radius:50%">';
      }
      if (nm && u.userName) nm.textContent = u.userName;
    } catch(e) {}
  }
});
