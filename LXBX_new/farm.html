tailwind.config={theme:{extend:{colors:{ocean:{50:'#eef6ff',100:'#d9ecff',200:'#bcdeff',300:'#8ec9ff',400:'#59a9ff',500:'#3385ff',600:'#1a65f5',700:'#1450e1',800:'#1741b6',900:'#19398f',950:'#142557'},mint:{50:'#edfcf5',100:'#d3f8e6',200:'#aaf0d1',300:'#73e2b5',400:'#3acd95',500:'#18b47d'},warm:{50:'#fff8ed',100:'#fff0d4',200:'#ffdda8',300:'#ffc371',400:'#ff9f38',500:'#ff8211',600:'#f06807',700:'#c74e08'}},fontFamily:{display:['"Noto Serif SC"','serif'],body:['"Noto Sans SC"','sans-serif']}}}};

<style>
:root{--nav-h:64px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;color:#1e293b;background:#f0f7ed;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse 80% 50% at 30% 20%,rgba(24,180,125,.08) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 70% 80%,rgba(255,159,56,.06) 0%,transparent 60%)}
#navbar{background:rgba(255,255,255,.82);backdrop-filter:blur(16px) saturate(1.4);box-shadow:0 1px 24px rgba(20,37,87,.07)}
#mobileMenu{transition:max-height .35s ease,opacity .3s;max-height:0;opacity:0;overflow:hidden}
#mobileMenu.open{max-height:400px;opacity:1}
.btn-primary{display:inline-flex;align-items:center;gap:6px;padding:10px 28px;background:linear-gradient(135deg,#18b47d,#0e7453);color:#fff;border-radius:12px;font-weight:600;font-size:.95rem;transition:transform .25s,box-shadow .25s;border:none;cursor:pointer}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(24,180,125,.35)}
.card{background:#fff;border-radius:18px;box-shadow:0 8px 32px rgba(20,37,87,.08)}
.avatar-svg{border-radius:50%}

/* Farm ground */
.farm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:420px;margin:0 auto}
.plot{aspect-ratio:1;border-radius:16px;background:linear-gradient(180deg,#d4a76a 0%,#c49a5c 100%);border:3px solid #b8894d;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.plot::before{content:'';position:absolute;inset:4px;border-radius:12px;background:linear-gradient(180deg,#8B6914 0%,#a07730 40%,#6d4c11 100%);opacity:.15}
.plot:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.12)}
.plot.empty{background:linear-gradient(180deg,#d4a76a,#c49a5c)}
.plot.seeded{background:linear-gradient(180deg,#c49a5c,#9b7b3a)}
.plot.growing{background:linear-gradient(180deg,#8fbc5a,#6d9e3a)}
.plot.ready{background:linear-gradient(180deg,#4ade80,#22c55e);border-color:#16a34a;animation:readyPulse 1.5s infinite}
@keyframes readyPulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.3)}50%{box-shadow:0 0 0 10px rgba(34,197,94,0)}}
.plot-emoji{font-size:2.2rem;line-height:1;z-index:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.15))}
.plot-label{font-size:.7rem;color:#fff;font-weight:600;margin-top:4px;z-index:1;text-shadow:0 1px 3px rgba(0,0,0,.3)}
.plot-progress{position:absolute;bottom:4px;left:8px;right:8px;height:5px;background:rgba(0,0,0,.15);border-radius:3px;overflow:hidden;z-index:1}
.plot-progress-fill{height:100%;background:linear-gradient(90deg,#fbbf24,#22c55e);border-radius:3px;transition:width .4s}

/* Resources bar */
.res-bar{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.res-item{display:flex;align-items:center;gap:5px;padding:6px 14px;background:#fff;border-radius:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);font-size:.85rem;font-weight:600}

/* Quiz modal */
.quiz-modal{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.quiz-modal.active{opacity:1;pointer-events:auto}
.quiz-bg{position:absolute;inset:0;background:rgba(20,37,87,.3);backdrop-filter:blur(6px)}
.quiz-box{position:relative;background:#fff;border-radius:24px;padding:32px 28px;max-width:440px;width:92%;box-shadow:0 24px 64px rgba(20,37,87,.18);transform:translateY(20px);transition:transform .35s}
.quiz-modal.active .quiz-box{transform:translateY(0)}

.quiz-opt{width:100%;padding:12px 16px;border:2px solid #bcdeff;border-radius:12px;background:#fff;text-align:left;font-size:.95rem;cursor:pointer;transition:all .2s;font-family:'Noto Sans SC',sans-serif;margin-bottom:8px}
.quiz-opt:hover{border-color:#3385ff;background:#eef6ff}
.quiz-opt.correct{border-color:#18b47d;background:#edfcf5;color:#0e7453}
.quiz-opt.wrong{border-color:#ef4444;background:#fef2f2;color:#dc2626}

/* Shop */
.shop-item{padding:12px;border-radius:14px;background:#fff;border:2px solid #d3f8e6;text-align:center;cursor:pointer;transition:all .2s}
.shop-item:hover{border-color:#18b47d;transform:translateY(-2px);box-shadow:0 4px 12px rgba(24,180,125,.15)}
.shop-item.disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

/* ═══ Unified Navbar ═══ */
#navbar{background:rgba(255,255,255,.82);backdrop-filter:blur(16px) saturate(1.4);box-shadow:0 1px 24px rgba(20,37,87,.07);transition:background .35s,box-shadow .35s}
.avatar-svg{border-radius:50%}
</style>
<script src="supabase-sync.js"></script>
</head>

<script>
/* === FARM STATE === */
const CROPS = [
  {name:'小麦',emoji:'🌾',seedEmoji:'🌱',growEmoji:'🌿',cost:0,growTime:3,reward:5},
  {name:'玉米',emoji:'🌽',seedEmoji:'🌱',growEmoji:'🌿',cost:8,growTime:4,reward:10},
  {name:'草莓',emoji:'🍓',seedEmoji:'🌱',growEmoji:'🍃',cost:15,growTime:5,reward:18},
  {name:'西瓜',emoji:'🍉',seedEmoji:'🌱',growEmoji:'🍃',cost:25,growTime:6,reward:30},
  {name:'苹果树',emoji:'🍎',seedEmoji:'🌱',growEmoji:'🌳',cost:40,growTime:8,reward:50},
];

let water=3, seeds=2, coins=0, level=1, exp=0;
let plots=[
  {state:'empty',crop:null,growth:0,maxGrowth:0},
  {state:'empty',crop:null,growth:0,maxGrowth:0},
  {state:'empty',crop:null,growth:0,maxGrowth:0},
  {state:'empty',crop:null,growth:0,maxGrowth:0},
  {state:'empty',crop:null,growth:0,maxGrowth:0},
  {state:'empty',crop:null,growth:0,maxGrowth:0},
  {state:'empty',crop:null,growth:0,maxGrowth:0},
  {state:'empty',crop:null,growth:0,maxGrowth:0},
  {state:'empty',crop:null,growth:0,maxGrowth:0},
];
let selectedCrop=0;

// Load state
try{
  const s=JSON.parse(localStorage.getItem('zhibanFarm')||'null');
  if(s){water=s.water;seeds=s.seeds;coins=s.coins;level=s.level;exp=s.exp||0;plots=s.plots;}
}catch(e){}

function saveState(){
  try{localStorage.setItem('zhibanFarm',JSON.stringify({water,seeds,coins,level,exp,plots}))}catch(e){}
}

function updateUI(){
  document.getElementById('waterCount').textContent=water;
  document.getElementById('seedCount').textContent=seeds;
  document.getElementById('coinCount').textContent=coins;
  try{document.getElementById('ptsDisplay').textContent=_getPoints();}catch(e){}
  document.getElementById('levelNum').textContent=level;
  renderFarm();
  renderShop();
  saveState();
}

function renderFarm(){
  const grid=document.getElementById('farmGrid');
  grid.innerHTML='';
  plots.forEach((p,i)=>{
    const div=document.createElement('div');
    div.className=`plot ${p.state}`;
    if(p.state==='empty'){
      div.innerHTML=`<span class="plot-emoji" style="font-size:1.8rem;opacity:.5">+</span><span class="plot-label">空地</span>`;
      div.onclick=()=>plantSeed(i);
    }else if(p.state==='seeded'){
      div.innerHTML=`<span class="plot-emoji">${p.crop.seedEmoji||'🌱'}</span><span class="plot-label">${p.crop.name}</span>
        <div class="plot-progress"><div class="plot-progress-fill" style="width:${(p.growth/p.maxGrowth*100)}%"></div></div>`;
      div.onclick=()=>waterPlot(i);
    }else if(p.state==='growing'){
      div.innerHTML=`<span class="plot-emoji">${p.crop.growEmoji||'🌿'}</span><span class="plot-label">${p.crop.name}</span>
        <div class="plot-progress"><div class="plot-progress-fill" style="width:${(p.growth/p.maxGrowth*100)}%"></div></div>`;
      div.onclick=()=>waterPlot(i);
    }else if(p.state==='ready'){
      div.innerHTML=`<span class="plot-emoji">${p.crop.emoji}</span><span class="plot-label">可收获!</span>`;
      div.onclick=()=>harvest(i);
    }
    grid.appendChild(div);
  });
}

function plantSeed(i){
  if(seeds<=0){alert('种子不足！答题获取更多种子吧');return;}
  const crop=CROPS[selectedCrop];
  seeds--;
  plots[i]={state:'seeded',crop,growth:0,maxGrowth:crop.growTime};
  updateUI();
}

function waterPlot(i){
  if(water<=0){alert('水滴不足！答题获取更多水滴吧');return;}
  const p=plots[i];
  water--;
  p.growth++;
  if(p.growth>=p.maxGrowth){
    p.state='ready';
  }else if(p.growth>=p.maxGrowth*0.5){
    p.state='growing';
  }
  updateUI();
}

function harvest(i){
  const p=plots[i];
  const reward=p.crop.reward;
  coins+=reward;
  exp+=reward;
  // Check level up
  const needed=level*30;
  if(exp>=needed){exp-=needed;level++;}
  _addPoints(reward);
  plots[i]={state:'empty',crop:null,growth:0,maxGrowth:0};
  updateUI();
}

function renderShop(){
  const grid=document.getElementById('shopGrid');
  grid.innerHTML='';
  CROPS.forEach((crop,i)=>{
    const div=document.createElement('div');
    const canBuy=coins>=crop.cost||crop.cost===0;
    div.className=`shop-item ${!canBuy&&crop.cost>0?'disabled':''}`;
    div.innerHTML=`<div class="text-2xl mb-1">${crop.emoji}</div><div class="text-xs font-semibold text-ocean-800">${crop.name}</div><div class="text-xs text-ocean-400">${crop.cost===0?'免费':crop.cost+' 金币'}</div>`;
    div.onclick=()=>{
      if(crop.cost>0&&coins<crop.cost)return;
      if(crop.cost>0)coins-=crop.cost;
      selectedCrop=i;
      seeds++;
      updateUI();
      // Flash feedback
      div.style.borderColor='#18b47d';
      div.style.background='#edfcf5';
      setTimeout(()=>{div.style.borderColor='';div.style.background=''},400);
    };
    grid.appendChild(div);
  });
}

/* === GRADE & SUBJECT SELECTION === */
let selectedGrade = 0;
let selectedSubject = '';

function showGradeSelect() {
  document.getElementById('gradeModal').classList.add('active');
}
function selectGrade(g) {
  selectedGrade = g;
  document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.grade-btn[data-g="${g}"]`).classList.add('active');
}
function selectSubject(s) {
  selectedSubject = s;
  document.querySelectorAll('.subj-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.subj-btn[data-s="${s}"]`).classList.add('active');
}
function confirmGradeSubject() {
  if (!selectedGrade || !selectedSubject) { alert('请选择年级和科目'); return; }
  localStorage.setItem('zhibanFarmGrade', selectedGrade);
  localStorage.setItem('zhibanFarmSubject', selectedSubject);
  document.getElementById('gradeModal').classList.remove('active');
  document.getElementById('currentGradeLabel').textContent = selectedGrade + '年级 · ' + selectedSubject;
}
function changeGradeSubject() { showGradeSelect(); }

// Init grade/subject
(function(){
  var g = localStorage.getItem('zhibanFarmGrade');
  var s = localStorage.getItem('zhibanFarmSubject');
  if (g && s) {
    selectedGrade = parseInt(g);
    selectedSubject = s;
    document.getElementById('currentGradeLabel').textContent = g + '年级 · ' + s;
  } else {
    setTimeout(showGradeSelect, 500);
  }
})();

/* === QUIZ SYSTEM === */
let quizAnswered=false;

function openQuiz(){
  if(!selectedGrade || !selectedSubject) { showGradeSelect(); return; }
  quizAnswered=false;
  const key = selectedGrade + '_' + selectedSubject;
  const pool = QB[key] || QB['3_语文'];
  const q = pool[Math.floor(Math.random()*pool.length)];
  window._currentQuiz = {subject: selectedSubject, question: q.q, options: q.opts, correctIdx: q.ans};
  
  document.getElementById('quizSubject').textContent = selectedGrade + '年级 · ' + selectedSubject;
  document.getElementById('quizQuestion').textContent = q.q;
  document.getElementById('quizResult').classList.add('hidden');

  const optsDiv=document.getElementById('quizOptions');
  optsDiv.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='quiz-opt';
    btn.textContent=opt;
    btn.onclick=()=>answerQuiz(btn,i,q.ans);
    optsDiv.appendChild(btn);
  });

  document.getElementById('quizModal').classList.add('active');
}

function answerQuiz(btn,idx,ans){
  if(quizAnswered)return;
  quizAnswered=true;
  document.querySelectorAll('.quiz-opt').forEach((b,i)=>{
    b.disabled=true;
    if(i===ans)b.classList.add('correct');
  });

  const resDiv=document.getElementById('quizResult');
  const resText=document.getElementById('quizResultText');

  if(idx===ans){
    btn.classList.add('correct');
    // Reward
    const wReward=Math.floor(Math.random()*2)+1;
    const sReward=Math.random()>.5?1:0;
    water+=wReward;
    seeds+=sReward;
    const bonusPts=5;_addPoints(bonusPts);
    resText.textContent=`✅ 回答正确！获得 ${wReward}水滴${sReward?` + ${sReward}种子`:''} + ${bonusPts}积分`;
    resText.style.color='#0e7453';
  }else{
    btn.classList.add('wrong');
    // Save to error book
    if(window._currentQuiz){
      var eb=[];try{eb=JSON.parse(localStorage.getItem('zhibanErrorBook')||'[]')}catch(e){}
      var cq=window._currentQuiz;
      if(window._lastSavedQ!==cq.question && !eb.find(function(x){return x.question===cq.question})){
        window._lastSavedQ=cq.question;
        eb.unshift({id:'err_'+Date.now(),subject:cq.subject,question:cq.question,options:cq.options,correctIdx:cq.correctIdx,userIdx:idx,source:'知识农场',date:new Date().toLocaleDateString(),mastered:false,reviewCount:0});
        localStorage.setItem('zhibanErrorBook',JSON.stringify(eb));
        if(window.sbErrorBook){var _l2=eb[0];if(_l2&&_l2.id)sbErrorBook.add(_l2).catch(function(){});}
      }
    }
    resText.textContent='❌ 回答错误，再接再厉！';
    resText.style.color='#dc2626';
  }
  resDiv.classList.remove('hidden');
  updateUI();
}

function closeQuiz(){
  document.getElementById('quizModal').classList.remove('active');
}
